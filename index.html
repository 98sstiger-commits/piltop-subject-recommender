<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>큐리큘라 — 선택과목 AI 설계</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g1:#071c0d;--g2:#0c2414;--g3:#0f2c19;--g4:#040e07;
      --cream:#ede5cc;
      --gold:#c9a843;--gold2:#d4b95a;--gold-dim:#a88a30;
      --text:#1a1a1a;--muted:#6b6460;
      --dc:rgba(237,229,204,0.55);--db:rgba(237,229,204,0.1);
      --fd:'Noto Serif KR','Apple SD Gothic Neo','Malgun Gothic',serif;
      --fb:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:#fff;color:var(--text)}

    /* ── HERO ── */
    .l-hero{
      background:var(--g1);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:60px 24px 80px;position:relative;overflow:hidden;
    }
    .l-hero::before{content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 65% 55% at 50% 42%,rgba(18,55,28,0.5),transparent 68%);pointer-events:none}
    .l-hero-badge{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(255,255,255,0.07);border:1px solid rgba(237,229,204,0.18);
      border-radius:999px;padding:6px 18px;
      font-size:13px;color:rgba(237,229,204,0.68);
      margin-bottom:28px;position:relative;z-index:2;
    }
    .l-hero-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;flex-shrink:0}
    /* 수행비서와 동일한 크기 */
    .l-hero-title{
      font-family:var(--fd);
      font-size:clamp(54px,7.5vw,88px);
      font-weight:900;color:var(--cream);
      line-height:1.05;letter-spacing:-1.5px;
      margin-bottom:44px;position:relative;z-index:2;
    }
    .l-hero-btn{
      padding:18px 64px;background:#fff;border:none;border-radius:14px;
      color:var(--g1);font-size:18px;font-weight:700;
      cursor:pointer;font-family:var(--fb);
      transition:background .15s,transform .1s;position:relative;z-index:10;
      box-shadow:0 2px 16px rgba(0,0,0,.22);
    }
    .l-hero-btn:hover{background:#f5f0e6}
    .l-hero-btn:active{transform:scale(.97)}

    /* ── TUTORIAL NAV ── */
    .l-tut-bar{background:#fff;border-bottom:1px solid #e5dfd4;padding:0 48px;height:50px;
      display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .l-tut-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
    .l-tut-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
    .l-tut-steps{display:flex;gap:20px}
    .l-tut-step{font-size:12px;color:#bbb;white-space:nowrap;cursor:pointer;transition:color .2s;text-decoration:none}
    .l-tut-step:hover{color:#555}
    .l-tut-step-num{font-weight:700;color:#ccc;margin-right:3px;font-size:11px}

    /* ── INTRO ── */
    .l-intro{background:var(--g2);padding:80px 72px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;overflow:hidden}
    .l-intro::after{content:'';position:absolute;right:-60px;top:50%;transform:translateY(-50%);
      width:480px;height:480px;border:1px solid rgba(237,229,204,.04);border-radius:50%;
      box-shadow:0 0 0 60px rgba(237,229,204,.017),0 0 0 120px rgba(237,229,204,.011),0 0 0 200px rgba(237,229,204,.006);pointer-events:none}
    .l-intro-eyebrow{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
    .l-intro-title{font-family:var(--fd);font-size:clamp(44px,5.5vw,68px);font-weight:900;color:var(--cream);line-height:1.05;letter-spacing:-1.5px;margin-bottom:12px}
    .l-intro-tagline{font-size:15px;color:rgba(237,229,204,.5);margin-bottom:16px;line-height:1.7}
    .l-intro-desc{font-size:15px;color:rgba(237,229,204,.58);line-height:1.9}
    .l-intro-desc strong{color:var(--cream)}
    .l-stats{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-end}
    .l-stat-num{font-family:var(--fd);font-size:clamp(44px,5vw,64px);font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1.5px}
    .l-stat-label{font-size:13px;color:rgba(237,229,204,.38);margin-top:5px;white-space:nowrap}

    /* ── HOW ── */
    .l-how{padding:80px 72px;background:#fff}
    .l-how-inner{max-width:1000px;margin:0 auto}
    .l-sec-label{font-size:11px;font-weight:700;color:var(--gold-dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
    .l-sec-title{font-size:clamp(24px,3.5vw,36px);font-weight:900;color:var(--text);letter-spacing:-1.5px;margin-bottom:8px}
    .l-sec-sub{font-size:14px;color:var(--muted);line-height:1.8;max-width:560px;margin-bottom:56px}
    .l-step{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-bottom:88px;scroll-margin-top:58px}
    .l-step:last-child{margin-bottom:0}
    .l-step.rev{direction:rtl}
    .l-step.rev>*{direction:ltr}
    .l-step-num-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .l-step-num{width:36px;height:36px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;font-weight:900;flex-shrink:0}
    .l-step-lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.12em;text-transform:uppercase}
    .l-step-title{font-size:clamp(20px,2.8vw,30px);font-weight:900;color:var(--text);line-height:1.25;letter-spacing:-1px;margin-bottom:12px}
    .l-step-desc{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:14px}
    .l-step-pts{list-style:none;display:flex;flex-direction:column;gap:8px}
    .l-step-pt{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text)}
    .l-step-chk{width:20px;height:20px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:10px;flex-shrink:0;margin-top:1px}
    .l-tip{background:rgba(201,168,67,.06);border:1px solid rgba(201,168,67,.15);border-radius:10px;padding:11px 15px;margin-top:13px;font-size:12px;color:var(--muted);line-height:1.75}
    .l-tip strong{color:#8a6e1a;font-weight:700}
    .l-badge-new{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,67,.12);border:1px solid rgba(201,168,67,.25);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--gold-dim);margin-bottom:10px;letter-spacing:.05em}

    /* MOCKUP */
    .l-mock{background:var(--g2);border-radius:16px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
    .l-mock-bar{display:flex;gap:6px;margin-bottom:13px}
    .l-mock-dot{width:10px;height:10px;border-radius:50%}
    .l-mock-ey{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;text-align:center;margin-bottom:5px}
    .l-mock-ttl{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--cream);text-align:center;margin-bottom:2px;letter-spacing:-0.5px}
    .l-mock-sub{font-size:11px;color:rgba(237,229,204,.28);text-align:center;margin-bottom:14px}
    .l-mock-card{background:rgba(255,255,255,.05);border:1px solid rgba(237,229,204,.07);border-radius:10px;padding:12px}
    .l-mock-lbl{font-size:10px;color:rgba(237,229,204,.3);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
    .l-mock-inp{background:rgba(255,255,255,.07);border:1px solid rgba(201,168,67,.2);border-radius:7px;padding:8px 11px;color:var(--cream);font-size:13px;width:100%;margin-bottom:7px;font-family:var(--fb)}
    .l-mock-btn{width:100%;padding:10px;background:var(--gold);border:none;border-radius:8px;color:var(--g1);font-size:13px;font-weight:800;text-align:center;font-family:var(--fb)}
    .l-mock-res{background:rgba(255,255,255,.04);border:1px solid rgba(237,229,204,.07);border-radius:10px;overflow:hidden}
    .l-mock-res-hd{background:rgba(201,168,67,.1);padding:8px 13px;display:flex;align-items:center;justify-content:space-between}
    .l-mock-res-tag{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.06em}
    .l-mock-res-bd{padding:9px 11px;display:flex;flex-direction:column;gap:6px}
    .l-mock-sc{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px}
    .l-mock-sc-n{font-size:12px;font-weight:700;color:var(--cream)}
    .l-mock-sc-c{font-size:10px;color:rgba(237,229,204,.27);margin-top:2px}
    .l-mock-bdg{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .bdg-필수{background:#DC2626;color:#fff}
    .bdg-추천{background:rgba(201,168,67,.88);color:var(--g1)}
    .bdg-선택{background:rgba(255,255,255,.1);color:rgba(237,229,204,.75)}
    .l-mock-lnk{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,67,.18);border-radius:10px;padding:12px}
    .l-mock-lnk-row{display:flex;gap:8px;align-items:center;margin-top:7px}
    .l-mock-lnk-url{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(237,229,204,.07);border-radius:6px;padding:7px 9px;color:rgba(237,229,204,.3);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .l-mock-copy{padding:7px 11px;background:var(--gold);border:none;border-radius:6px;color:var(--g1);font-size:11px;font-weight:700;white-space:nowrap;font-family:var(--fb)}

    /* ── CTA ── */
    .l-cta{background:var(--g2);padding:80px 48px;text-align:center;position:relative;overflow:hidden}
    .l-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 80% at 50% 100%,rgba(18,55,28,.5),transparent);pointer-events:none}
    .l-cta-label{font-size:11px;font-weight:700;color:rgba(237,229,204,.3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;position:relative;z-index:1}
    .l-cta-title{font-family:var(--fd);font-size:clamp(26px,4vw,42px);font-weight:900;color:var(--cream);letter-spacing:-1.5px;margin-bottom:12px;position:relative;z-index:1}
    .l-cta-title em{color:var(--gold);font-style:normal}
    .l-cta-sub{font-size:15px;color:var(--dc);margin-bottom:36px;line-height:1.8;position:relative;z-index:1}
    .l-cta-btn{padding:16px 52px;background:var(--gold);border:none;border-radius:12px;color:var(--g1);font-size:16px;font-weight:800;cursor:pointer;font-family:var(--fb);transition:background .2s;position:relative;z-index:1}
    .l-cta-btn:hover{background:var(--gold2)}

    /* ── FOOTER ── */
    .l-footer{background:var(--g4);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .l-footer-logo{font-family:var(--fd);font-size:14px;font-weight:700;color:rgba(237,229,204,.4)}
    .l-footer-logo em{color:var(--gold);font-style:normal}
    .l-footer-copy{font-size:12px;color:rgba(237,229,204,.18)}

    /* ── FORM PAGE ── */
    .fp{min-height:100vh;background:var(--g1);display:flex;flex-direction:column}
    .fp-top{background:var(--g2);padding:44px 48px 96px;text-align:center;position:relative;overflow:hidden}
    .fp-top::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(18,55,28,.45),transparent);pointer-events:none}
    .fp-back-btn{position:absolute;top:20px;left:24px;background:none;border:none;color:rgba(237,229,204,.4);font-size:13px;cursor:pointer;font-family:var(--fb);z-index:10;display:flex;align-items:center;gap:5px}
    .fp-back-btn:hover{color:var(--cream)}
    .fp-logo-top{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:15px;font-weight:700;color:rgba(237,229,204,.55);z-index:10;cursor:pointer;white-space:nowrap}
    .fp-logo-top em{color:var(--gold);font-style:normal}
    .fp-ey{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;position:relative;z-index:1}
    .fp-ttl{font-family:var(--fd);font-size:clamp(36px,5.5vw,58px);font-weight:900;color:var(--cream);line-height:1.05;letter-spacing:-1.5px;margin-bottom:8px;position:relative;z-index:1}
    .fp-sub{font-size:14px;color:rgba(237,229,204,.42);position:relative;z-index:1}
    .fp-card-wrap{padding:0 24px 60px;margin-top:-58px;display:flex;justify-content:center;position:relative;z-index:10}
    .fp-card{max-width:680px;width:100%;background:#fff;border-radius:20px;padding:30px 26px 26px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
    .fp-card-title{font-size:15px;font-weight:700;color:var(--text);text-align:center;margin-bottom:20px}
    .fp-row{display:grid;grid-template-columns:110px 1fr 1fr;gap:11px;margin-bottom:11px}
    .fp-grp{display:flex;flex-direction:column}
    .fp-lbl{font-size:12px;font-weight:600;color:#888;margin-bottom:6px}
    .req{color:var(--gold);margin-left:2px}
    .fp-ctrl{background:#f8f6f2;border:1.5px solid #e5dfd4;border-radius:10px;color:var(--text);padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s;font-family:var(--fb);width:100%}
    .fp-ctrl:focus{border-color:var(--g2);background:#fff}
    .fp-ctrl::placeholder{color:#c0bab0}
    select.fp-ctrl option{background:#fff;color:var(--text)}
    .fp-full{margin-bottom:20px}
    .fp-full-lbl{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;display:block}
    .fp-submit{width:100%;padding:13px;background:var(--gold);border:none;border-radius:12px;color:var(--g1);font-size:16px;font-weight:800;cursor:pointer;font-family:var(--fb);transition:background .2s}
    .fp-submit:hover:not(:disabled){background:var(--gold2)}
    .fp-submit:disabled{opacity:.35;cursor:not-allowed}
    .fp-err{margin-top:11px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:13px;line-height:1.6}
    .fp-notice{margin-top:12px;padding:10px 14px;background:rgba(201,168,67,.06);border:1px solid rgba(201,168,67,.2);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.6;text-align:center}

    /* ── LOADING ── */
    .ld{background:var(--g1);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .spinner{width:42px;height:42px;border:3px solid rgba(201,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ld-text{color:var(--cream);font-size:15px;font-weight:600}
    .ld-sub{font-size:12px;color:rgba(237,229,204,.35);margin-top:2px}
    .ld-steps{display:flex;flex-direction:column;gap:7px;margin-top:12px}
    .ld-step{font-size:12px;display:flex;align-items:center;gap:7px;color:rgba(237,229,204,.2);transition:color .4s}
    .ld-step.active{color:var(--gold)}
    .ld-step.done{color:rgba(86,196,122,.7)}
    .ld-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

    /* ── RESULTS ── */
    .rp{background:var(--g1);min-height:100vh;display:flex;flex-direction:column}
    .rp-top-section{background:var(--g2);padding:36px 48px 88px;text-align:center;position:relative;overflow:hidden}
    .rp-top-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(18,55,28,.45),transparent);pointer-events:none}
    .rp-home-btn{position:absolute;top:20px;left:24px;background:none;border:none;color:rgba(237,229,204,.4);font-size:13px;cursor:pointer;font-family:var(--fb);z-index:10}
    .rp-home-btn:hover{color:var(--cream)}
    .rp-ey{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;position:relative;z-index:1}
    .rp-hd-ttl{font-family:var(--fd);font-size:clamp(30px,4.5vw,50px);font-weight:900;color:var(--cream);letter-spacing:-1.5px;margin-bottom:6px;position:relative;z-index:1}
    .rp-hd-sub{font-size:13px;color:rgba(237,229,204,.4);position:relative;z-index:1;margin-bottom:24px}
    .rp-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:560px;margin:0 auto;position:relative;z-index:1}
    .rp-stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(237,229,204,.08);border-radius:12px;padding:16px 20px;text-align:center}
    .rp-stat-num{font-family:var(--fd);font-size:30px;font-weight:900;color:var(--cream);line-height:1}
    .rp-stat-num.red{color:#DC2626}
    .rp-stat-num.amber{color:var(--gold)}
    .rp-stat-label{font-size:12px;color:rgba(237,229,204,.38);margin-top:4px}
    .rp-card-wrap{padding:0 24px 60px;margin-top:-48px;position:relative;z-index:10}
    .rp-card{max-width:960px;margin:0 auto;background:#fff;border-radius:20px;padding:26px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
    .rp-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:4px 12px;background:#f5f0e6;border:1px solid #e0d8c0;color:#7a6228;border-radius:20px;font-size:12px;font-weight:600}
    .rp-btns{display:flex;gap:8px;flex-wrap:wrap}
    .rb-link{padding:8px 14px;background:var(--g2);border:none;border-radius:8px;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);white-space:nowrap;transition:background .15s}
    .rb-link:hover{background:var(--g3)}
    .rb-pdf{padding:8px 14px;background:var(--gold);border:none;border-radius:8px;color:var(--g1);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fb);white-space:nowrap;transition:background .15s}
    .rb-pdf:hover{background:var(--gold2)}
    .rb-back{padding:8px 14px;background:#f5f0e6;border:1px solid #e0d8c0;border-radius:8px;color:#7a6228;font-size:13px;cursor:pointer;font-family:var(--fb);white-space:nowrap}
    .strat{background:#f8f5ec;border:1px solid #e0d8c0;border-radius:12px;padding:16px 20px;margin-bottom:18px}
    .strat-lbl{font-size:10px;font-weight:800;color:#8a6e1a;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    .strat-txt{font-size:14px;line-height:1.85;color:var(--text)}
    .psec{margin-bottom:18px}
    .phdr{display:flex;align-items:center;gap:10px;margin-bottom:11px;padding-bottom:9px;border-bottom:1.5px solid #f0ebe0}
    .pbdg{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800}
    .pb-필수{background:#DC2626;color:#fff}
    .pb-추천{background:var(--gold);color:var(--g1)}
    .pb-선택{background:#f0ebe0;color:#7a6228}
    .pdsc{font-size:12px;color:#999}
    .pcnt{margin-left:auto;font-size:12px;color:#bbb}
    .sc-필수{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
    .sc-추천{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
    .sc-선택{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
    .scard{background:#fafaf8;border:1px solid #ede8de;border-radius:14px;padding:15px;transition:transform .2s,box-shadow .2s}
    .scard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .sc-필수 .scard{border-left:3px solid #DC2626}

                <div className="l-mock-lnk-row"><div className="l-mock-lnk-url">piltop-subject-recommender.vercel.app/#r=...</div><button className="l-mock-copy">복사</button></div>
              </div>
              <div style={{marginTop:10}} className="l-mock-res">
                <div className="l-mock-res-hd"><span className="l-mock-res-tag">과목 선택 전략</span></div>
                <div style={{padding:'11px 13px',fontSize:12,color:'rgba(237,229,204,.5)',lineHeight:1.75}}>서울대 의학과 진학을 위해 화학·생명과학·미적분Ⅱ를 필수 이수하고, 세포와 물질대사, 화학 반응의 세계로 전공 역량을 구체화하세요.</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section className="l-cta">
        <div style={{maxWidth:560,margin:'0 auto'}}>
          <div className="l-cta-label">지금 바로 시작하세요</div>
          <h2 className="l-cta-title">진로가 정해지면<br/><em>과목은 AI가 설계합니다</em></h2>
          <p className="l-cta-sub">학년·진로·전공 입력만으로 실시간 대학 권장과목 반영,<br/>맞춤 선택과목과 세특 탐구 주제까지 한번에</p>
          <button className="l-cta-btn" onClick={onStart} type="button">시작하기 →</button>
        </div>
      </section>
      <footer className="l-footer">
        <div className="l-footer-logo"><em>큐리큘라</em> — 선택과목 AI 설계</div>
        <div className="l-footer-copy">2022 개정 교육과정 기준 · 권장과목은 대학별로 매년 변경됩니다 · 필탑학원</div>
      </footer>
    </div>
  );
}

function FormPage({onBack,onResult}){
  const [form,setForm]=useState({grade:'1',career:'',major:'',university:''});
  const [error,setError]=useState(null);
  const [loading,setLoading]=useState(false);
  const [lstep,setLstep]=useState(0);
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const valid=form.career.trim()&&form.major.trim();

  const submit=async()=>{
    setLoading(true);setError(null);setLstep(0);
    const t=setInterval(()=>setLstep(s=>s<LSTEPS.length-1?s+1:s),3500);
    const msg=`고${form.grade}학년, 희망진로:${form.career}, 희망전공:${form.major}${form.university?`, 희망대학:${form.university}`:''}`;
    try{
      const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:2000,
          system:SYSTEM,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          messages:[{role:'user',content:msg}]
        })});
      const data=await res.json();
      if(!res.ok) throw new Error(data?.error?.message||data?.error||`오류 ${res.status}`);
      // 웹서치 사용 시 여러 content block 중 text만 추출
      const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text||'').join('');
      if(!raw) throw new Error('응답을 받지 못했습니다. 다시 시도해주세요.');
      const clean=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      // JSON 부분만 추출
      const jsonMatch=clean.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error('결과 파싱 오류. 다시 시도해주세요.');
      clearInterval(t);
      onResult({results:JSON.parse(jsonMatch[0]),form});
    }catch(e){clearInterval(t);setError(`오류: ${String(e.message)}`);setLoading(false);}
  };

  if(loading) return(
    <div className="ld">
      <div className="spinner"/>
      <p className="ld-text">{LSTEPS[lstep]}...</p>
      <p className="ld-sub">웹 검색 포함 20~30초 소요됩니다</p>
      <div className="ld-steps">{LSTEPS.map((s,i)=>(
        <div key={i} className={`ld-step ${i<lstep?'done':i===lstep?'active':''}`}><span className="ld-dot"/><span>{s}</span></div>
      ))}</div>
    </div>
  );

  return(
    <div className="fp">
      <div className="fp-top">
        <button className="fp-back-btn" onClick={onBack}>← 돌아가기</button>
        <div className="fp-logo-top" onClick={onBack}><em>큐리큘라</em></div>
        <div className="fp-ey">SUBJECT RECOMMENDER</div>
        <h1 className="fp-ttl">큐리큘라</h1>
        <p className="fp-sub">진로 맞춤 선택과목 AI 설계</p>
      </div>
      <div className="fp-card-wrap">
        <div className="fp-card">
          <div className="fp-card-title">학년 · 진로 · 전공을 입력해주세요</div>
          <div className="fp-row">
            <div className="fp-grp"><label className="fp-lbl">학년<span className="req">*</span></label><select className="fp-ctrl" value={form.grade} onChange={set('grade')}><option value="1">고1</option><option value="2">고2</option></select></div>
            <div className="fp-grp"><label className="fp-lbl">희망 진로<span className="req">*</span></label><input className="fp-ctrl" placeholder="예: 의사, 소프트웨어 엔지니어…" value={form.career} onChange={set('career')}/></div>
            <div className="fp-grp"><label className="fp-lbl">희망 전공<span className="req">*</span></label><input className="fp-ctrl" placeholder="예: 의학과, 컴퓨터공학과…" value={form.major} onChange={set('major')}/></div>
          </div>
          <div className="fp-full">
            <label className="fp-full-lbl">희망 대학 <span style={{fontWeight:400,color:'#bbb'}}>선택 — 입력 시 해당 대학 권장과목 실시간 반영</span></label>
            <input className="fp-ctrl" placeholder="예: 서울대, 연세대, 성균관대…" value={form.university} onChange={set('university')}/>
          </div>
          <button className="fp-submit" onClick={submit} disabled={!valid}>추천받기 →</button>
          {error&&<div className="fp-err">{error}</div>}
          <div className="fp-notice">🔍 웹 검색으로 최신 대학 권장과목을 반영합니다 · 20~30초 소요</div>
        </div>
      </div>
    </div>
  );
}

function PSection({priority,subjects}){
  const list=subjects.filter(s=>s.priority===priority);
  if(!list.length) return null;
  return(
    <div className="psec">
      <div className="phdr"><span className={`pbdg pb-${priority}`}>{priority}</span><span className="pdsc">{PMETA[priority].desc}</span><span className="pcnt">{list.length}과목</span></div>
      <div className={`sc-${priority}`}>
        {list.map((s,i)=>(
          <div key={i} className="scard">
            <div className="sc-top"><span className="sname">{s.name}</span><span className={catClass(s.category)}>{s.category}</span></div>
            <p className="sreason">{s.reason}</p>
            <div className="ext-lbl">세특 탐구 주제</div>
            <ul className="ext-list">{(s.extracurricular||[]).map((t,j)=>(<li key={j} className="ext-item"><span className="ext-dot"/>{t}</li>))}</ul>
          </div>
        ))}
      </div>
    </div>
  );
}

function ResultsPage({results,form,onBack,onNew}){
  const [toast,setToast]=useState(false);
  const url=mkUrl({results,form});
  const copy=()=>{if(!url)return;navigator.clipboard.writeText(url).then(()=>{setToast(true);setTimeout(()=>setToast(false),2200);});};
  const total=(results.subjects||[]).length;
  const 필수cnt=(results.subjects||[]).filter(s=>s.priority==='필수').length;
  const 추천cnt=(results.subjects||[]).filter(s=>s.priority==='추천').length;

  return(
    <div className="rp">
      <div className="rp-top-section">
        <button className="rp-home-btn" onClick={onNew}>← 처음으로</button>
        <div className="rp-ey">SUBJECT RECOMMENDER</div>
        <div className="rp-hd-ttl">큐리큘라</div>
        <div className="rp-hd-sub">맞춤 과목 추천 결과 대시보드</div>
        <div className="rp-stat-row">
          <div className="rp-stat-card"><div className="rp-stat-num">{total}</div><div className="rp-stat-label">전체 과목</div></div>
          <div className="rp-stat-card"><div className="rp-stat-num red">{필수cnt}</div><div className="rp-stat-label">필수</div></div>
          <div className="rp-stat-card"><div className="rp-stat-num amber">{추천cnt}</div><div className="rp-stat-label">추천</div></div>
        </div>
      </div>
      <div className="rp-card-wrap">
        <div className="rp-card">
          <div className="rp-card-top">
            <div className="chips">
              <span className="chip">고{form.grade}</span>
              <span className="chip">{form.career}</span>
              <span className="chip">{form.major}</span>
              {form.university&&<span className="chip">{form.university}</span>}
            </div>
            <div className="rp-btns">
              <button className="rb-link" onClick={copy}>🔗 링크 복사</button>
              <button className="rb-pdf" onClick={()=>window.print()}>📄 PDF 저장</button>
              <button className="rb-back" onClick={onBack}>↩ 다시 입력</button>
            </div>
          </div>
          <div className="strat"><div className="strat-lbl">과목 선택 전략</div><p className="strat-txt">{results.overall_strategy}</p></div>
          {['필수','추천','선택'].map(p=><PSection key={p} priority={p} subjects={results.subjects||[]}/>)}
          <div className="rp-footer">2022 개정 교육과정 기준 · 웹 검색 기반 대학 권장과목 반영 · 반드시 각 대학 입학처에서 최신 정보를 확인하세요 · 필탑학원</div>
        </div>
      </div>
      {toast&&<div className="toast">✓ 링크가 복사되었습니다</div>}
    </div>
  );
}

function App(){
  const [page,setPage]=useState('landing');
  const [rdata,setRdata]=useState(null);
  useEffect(()=>{const h=location.hash;if(h.startsWith('#r=')){const d=dec(h.slice(3));if(d?.results&&d?.form){setRdata(d);setPage('results');}}},[]);
  const goForm=()=>{setPage('form');window.scrollTo(0,0);};
  const goHome=()=>{setPage('landing');window.scrollTo(0,0);history.pushState('','',location.pathname);};
  const goResult=d=>{setRdata(d);setPage('results');const u=mkUrl(d);if(u)history.pushState('','',u);window.scrollTo(0,0);};
  if(page==='landing') return <Landing onStart={goForm}/>;
  if(page==='form') return <FormPage onBack={goHome} onResult={goResult}/>;
  if(page==='results'&&rdata) return <ResultsPage results={rdata.results} form={rdata.form} onBack={()=>setPage('form')} onNew={goHome}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
