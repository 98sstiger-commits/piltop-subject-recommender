<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>과목나침반 — 진로 맞춤 선택과목 AI 설계</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:#1a3a28;--g2:#122b1e;--g3:#0e2218;--g4:#0a1a12;
      --cream:#f5f0e6;--cream2:#ede6d6;--cream3:#e0d8c4;
      --gold:#c9a843;--gold2:#d4b95a;--gold3:#b8962e;
      --text:#1a1a1a;--muted:#6b6b5a;
      --dg-cream:rgba(242,234,216,0.55);--dg-border:rgba(242,234,216,0.12);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:var(--text);min-height:100vh}

    /* ── NAV ── */
    .nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;transition:background .3s,border .3s}
    .nav.scrolled{background:var(--g);border-bottom:1px solid var(--dg-border)}
    .nav-logo{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;cursor:pointer}
    .nav-logo span{color:var(--gold)}
    .nav-btn{padding:8px 20px;background:var(--gold);border:none;border-radius:8px;color:var(--g3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
    .nav-btn:hover{background:var(--gold2)}

    /* ── HERO (dark) ── */
    .hero{background:var(--g3);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(201,168,67,.07),transparent)}
    .hero-eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .hero-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hero-title{font-size:clamp(52px,8vw,96px);font-weight:900;color:#fff;line-height:1.0;letter-spacing:-3px;margin-bottom:16px;position:relative;z-index:1}
    .hero-title span{color:var(--gold)}
    .hero-sub{font-size:16px;color:rgba(242,234,216,.6);line-height:1.8;margin-bottom:44px;max-width:480px}
    .hero-cta{padding:16px 48px;background:var(--gold);border:none;border-radius:12px;color:var(--g3);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;letter-spacing:-.3px}
    .hero-cta:hover{background:var(--gold2)}
    .hero-cta:active{transform:scale(.97)}
    .hero-stats{display:flex;gap:48px;margin-top:56px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
    .hero-stat-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1}
    .hero-stat-label{font-size:12px;color:rgba(242,234,216,.5);margin-top:5px}
    .hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(242,234,216,.3);font-size:11px;letter-spacing:.1em}
    .hero-scroll-line{width:1px;height:32px;background:linear-gradient(to bottom,rgba(201,168,67,.5),transparent);animation:scrollLine 1.8s ease-in-out infinite}
    @keyframes scrollLine{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(0);transform-origin:bottom}}

    /* ── SECTION BASE ── */
    .section{padding:80px 24px}
    .section-inner{max-width:1000px;margin:0 auto}
    .section-label{font-size:11px;font-weight:700;color:var(--gold3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
    .section-title{font-size:clamp(28px,4vw,42px);font-weight:900;color:var(--text);line-height:1.2;letter-spacing:-1px;margin-bottom:14px}
    .section-sub{font-size:15px;color:var(--muted);line-height:1.8;max-width:580px}

    /* ── WHY 3 CARDS ── */
    .why-section{background:var(--cream);padding:80px 24px}
    .why-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px}
    .why-card{background:var(--g);border-radius:16px;padding:28px 24px;color:#fff}
    .why-card-num{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-bottom:16px}
    .why-card-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
    .why-card-sub{font-size:12px;color:rgba(242,234,216,.5);margin-bottom:16px}
    .why-card-divider{height:1px;background:rgba(242,234,216,.12);margin-bottom:14px}
    .why-card-text{font-size:13px;color:rgba(242,234,216,.65);line-height:1.75}

    /* ── HOW (steps) ── */
    .how-section{background:#fff;padding:80px 24px}
    .how-step{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;margin-top:64px}
    .how-step:first-of-type{margin-top:48px}
    .how-step.reverse{direction:rtl}
    .how-step.reverse>*{direction:ltr}
    .step-num-wrap{display:flex;align-items:center;gap:14px;margin-bottom:8px}
    .step-num{width:36px;height:36px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;font-weight:800;flex-shrink:0}
    .step-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .step-title{font-size:clamp(24px,3vw,34px);font-weight:900;color:var(--text);line-height:1.2;letter-spacing:-1px;margin-bottom:14px}
    .step-desc{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:18px}
    .step-points{list-style:none;display:flex;flex-direction:column;gap:8px}
    .step-point{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text)}
    .step-check{width:20px;height:20px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:11px;flex-shrink:0;margin-top:1px}
    .step-tip{background:rgba(201,168,67,.08);border:1px solid rgba(201,168,67,.2);border-radius:10px;padding:12px 16px;margin-top:16px;font-size:12px;color:var(--muted);line-height:1.7}
    .step-tip strong{color:var(--gold3)}

    /* MOCKUP */
    .mockup{background:var(--g);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .mockup-bar{display:flex;gap:6px;margin-bottom:16px}
    .mockup-dot{width:10px;height:10px;border-radius:50%}
    .mockup-eyebrow{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-bottom:8px}
    .mockup-title{font-size:22px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px}
    .mockup-sub{font-size:12px;color:rgba(242,234,216,.45);text-align:center;margin-bottom:20px}
    .mockup-card{background:rgba(255,255,255,.06);border:1px solid rgba(242,234,216,.1);border-radius:10px;padding:14px}
    .mockup-label{font-size:10px;color:rgba(242,234,216,.4);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
    .mockup-input{background:rgba(255,255,255,.08);border:1px solid rgba(201,168,67,.3);border-radius:7px;padding:10px 12px;color:#fff;font-size:13px;width:100%;margin-bottom:10px;font-family:inherit}
    .mockup-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:var(--g3);font-size:14px;font-weight:800;text-align:center;font-family:inherit}

    .mockup-result{background:rgba(255,255,255,.06);border:1px solid rgba(242,234,216,.1);border-radius:10px;overflow:hidden}
    .mockup-result-header{background:rgba(201,168,67,.12);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
    .mockup-result-tag{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.06em}
    .mockup-result-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
    .mockup-scard{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:8px;padding:10px 12px}
    .mockup-scard-left{flex:1}
    .mockup-scard-name{font-size:13px;font-weight:700;color:#fff}
    .mockup-scard-cat{font-size:10px;color:rgba(242,234,216,.4);margin-top:2px}
    .mockup-badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .mb-필수{background:#DC2626;color:#fff}
    .mb-추천{background:rgba(201,168,67,.9);color:var(--g3)}
    .mb-선택{background:rgba(255,255,255,.15);color:rgba(242,234,216,.8)}

    .mockup-link{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,67,.3);border-radius:10px;padding:14px}
    .mockup-link-label{font-size:10px;color:rgba(242,234,216,.4);margin-bottom:8px;font-weight:700;letter-spacing:.06em}
    .mockup-link-row{display:flex;gap:8px;align-items:center}
    .mockup-link-url{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(242,234,216,.12);border-radius:6px;padding:8px 10px;color:rgba(242,234,216,.5);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .mockup-copy-btn{padding:8px 12px;background:var(--gold);border:none;border-radius:6px;color:var(--g3);font-size:11px;font-weight:700;white-space:nowrap;font-family:inherit}

    /* ── CTA ── */
    .cta-section{background:var(--g);padding:80px 24px;text-align:center}
    .cta-title{font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:12px}
    .cta-title span{color:var(--gold)}
    .cta-sub{font-size:15px;color:rgba(242,234,216,.55);margin-bottom:36px;line-height:1.8}
    .cta-btn{padding:16px 52px;background:var(--gold);border:none;border-radius:12px;color:var(--g3);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s}
    .cta-btn:hover{background:var(--gold2)}

    /* ── FOOTER ── */
    .footer{background:var(--g4);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .footer-logo{font-size:14px;font-weight:800;color:rgba(242,234,216,.6)}
    .footer-logo span{color:var(--gold)}
    .footer-copy{font-size:12px;color:rgba(242,234,216,.28)}

    /* ── FORM PAGE ── */
    .form-page{background:var(--g3);min-height:100vh;display:flex;flex-direction:column}
    .form-page-header{background:var(--g);border-bottom:1px solid var(--dg-border);padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .form-page-logo{font-size:16px;font-weight:800;color:#fff;cursor:pointer}
    .form-page-logo span{color:var(--gold)}
    .form-page-back{font-size:13px;color:var(--dg-cream);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s}
    .form-page-back:hover{color:#fff}
    .form-hero{background:var(--g);padding:52px 24px 60px;text-align:center;border-bottom:1px solid var(--dg-border)}
    .form-eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
    .form-title{font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:10px}
    .form-title span{color:var(--gold)}
    .form-tagline{font-size:15px;color:var(--dg-cream);line-height:1.8}
    .form-body{flex:1;padding:40px 24px 72px;display:flex;justify-content:center;align-items:flex-start}
    .form-card{max-width:680px;width:100%;background:rgba(255,255,255,.05);border:1px solid var(--dg-border);border-radius:18px;padding:28px 24px 22px}
    .form-row{display:grid;grid-template-columns:110px 1fr 1fr;gap:10px;margin-bottom:10px}
    .f-group{display:flex;flex-direction:column}
    .f-label{font-size:11px;font-weight:700;color:var(--dg-cream);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase}
    .req{color:var(--gold);margin-left:2px}
    .f-control{background:rgba(255,255,255,.07);border:1px solid var(--dg-border);border-radius:9px;color:#fff;padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;width:100%}
    .f-control:focus{border-color:var(--gold);background:rgba(255,255,255,.1)}
    .f-control::placeholder{color:rgba(242,234,216,.22)}
    select.f-control option{background:#1a3a28;color:#fff}
    .f-full{margin-bottom:18px}
    .f-submit{width:100%;padding:13px;background:var(--gold);border:none;border-radius:10px;color:var(--g3);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s}
    .f-submit:hover:not(:disabled){background:var(--gold2)}
    .f-submit:disabled{opacity:.38;cursor:not-allowed}
    .f-error{margin-top:10px;padding:11px 14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:8px;color:#f87171;font-size:13px;line-height:1.6}

    /* ── LOADING ── */
    .loading-page{background:var(--g3);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .spinner{width:42px;height:42px;border:3px solid rgba(201,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:#fff;font-size:15px;font-weight:600}
    .loading-steps{display:flex;flex-direction:column;gap:7px;margin-top:8px}
    .l-step{font-size:12px;display:flex;align-items:center;gap:7px;color:rgba(242,234,216,.25);transition:color .4s}
    .l-step.active{color:var(--gold)}
    .l-step.done{color:rgba(86,196,122,.7)}
    .l-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

    /* ── RESULTS PAGE ── */
    .results-page{background:var(--g3);min-height:100vh;display:flex;flex-direction:column}
    .results-body{flex:1;padding:36px 24px 72px}
    .results-inner{max-width:980px;margin:0 auto}
    .results-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
    .results-title-main{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.5px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:4px 12px;background:rgba(201,168,67,.15);border:1px solid rgba(201,168,67,.3);color:var(--gold);border-radius:20px;font-size:12px;font-weight:600}
    .r-btns{display:flex;gap:8px;flex-wrap:wrap}
    .r-btn-pdf{padding:8px 16px;background:var(--gold);border:none;border-radius:8px;color:var(--g3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
    .r-btn-pdf:hover{background:var(--gold2)}
    .r-btn-link{padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid var(--dg-border);border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .r-btn-link:hover{background:rgba(255,255,255,.15)}
    .r-btn-back{padding:8px 16px;background:transparent;border:1px solid var(--dg-border);border-radius:8px;color:var(--dg-cream);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .r-btn-back:hover{border-color:var(--gold);color:var(--gold)}

    /* LINK COPIED TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--g);border:1px solid rgba(201,168,67,.3);color:var(--gold);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;animation:toastIn .3s ease;white-space:nowrap}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* LINK BOX */
    .link-box{background:rgba(201,168,67,.06);border:1px solid rgba(201,168,67,.2);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .link-box-label{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap}
    .link-box-url{flex:1;font-size:12px;color:var(--dg-cream);background:rgba(255,255,255,.05);border:1px solid var(--dg-border);border-radius:7px;padding:7px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .link-box-copy{padding:7px 14px;background:var(--gold);border:none;border-radius:7px;color:var(--g3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

    .strategy-box{background:rgba(201,168,67,.08);border:1px solid rgba(201,168,67,.2);border-radius:14px;padding:20px 24px;margin-bottom:24px}
    .strategy-label{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
    .strategy-text{font-size:14px;line-height:1.85;color:#fff}

    .priority-section{margin-bottom:24px}
    .priority-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--dg-border)}
    .p-badge{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800}
    .pb-필수{background:#DC2626;color:#fff}
    .pb-추천{background:rgba(201,168,67,.9);color:var(--g3)}
    .pb-선택{background:rgba(255,255,255,.12);color:#fff}
    .p-desc{font-size:12px;color:var(--dg-cream)}
    .p-count{margin-left:auto;font-size:12px;color:rgba(242,234,216,.35)}
    .scards-필수{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .scards-추천{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .scards-선택{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .scard{background:var(--g);border:1px solid var(--dg-border);border-radius:14px;padding:16px;transition:border-color .2s,transform .2s}
    .scard:hover{transform:translateY(-2px)}
    .scard-필수{border-left:3px solid #DC2626}
    .scard-추천{border-left:3px solid var(--gold)}
    .scard-선택{border-left:3px solid rgba(255,255,255,.18)}
    .scard-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .sname{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
    .cat{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
    .cat-g{background:rgba(91,156,246,.15);color:#7bb3f8;border:1px solid rgba(91,156,246,.25)}
    .cat-c{background:rgba(201,168,67,.15);color:var(--gold);border:1px solid rgba(201,168,67,.25)}
    .cat-f{background:rgba(86,196,122,.15);color:#6dcf8a;border:1px solid rgba(86,196,122,.25)}
    .sreason{font-size:13px;line-height:1.7;color:var(--dg-cream);padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--dg-border)}
    .ext-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px}
    .ext-list{list-style:none;display:flex;flex-direction:column;gap:5px}
    .ext-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--dg-cream);line-height:1.5}
    .ext-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;margin-top:5px;flex-shrink:0}
    .result-footer{margin-top:24px;text-align:center;font-size:11px;color:rgba(242,234,216,.25);line-height:1.7}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--g);border:1px solid rgba(201,168,67,.22);border-radius:20px;max-width:640px;width:100%;max-height:82vh;overflow-y:auto;animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 0}
    .modal-title{font-size:18px;font-weight:800;color:#fff}
    .modal-close{background:none;border:none;color:var(--dg-cream);font-size:20px;cursor:pointer;line-height:1;transition:color .15s}

function decodeResults(str){

function FormPage({onBack, onResult}){
  const [form, setForm] = useState({grade:'1',career:'',major:'',university:''});
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lstep, setLstep] = useState(0);
  const set = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const valid = form.career.trim()&&form.major.trim();

  const submit = async()=>{
    setLoading(true); setError(null); setLstep(0);
    const timer = setInterval(()=>setLstep(s=>s<LOADING_STEPS.length-1?s+1:s),2400);
    const msg=`고${form.grade}학년, 희망진로: ${form.career}, 희망전공: ${form.major}${form.university?`, 희망대학: ${form.university}`:''}`;
    try{
      const res=await fetch('/api/proxy',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:SYSTEM,messages:[{role:'user',content:msg}]})
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data?.error?.message||data?.error||`오류 ${res.status}`);
      const raw=data.content[0].text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      const parsed=JSON.parse(raw);
      clearInterval(timer);
      onResult({results:parsed, form});
    }catch(e){
      clearInterval(timer);
      setError(`오류: ${String(e.message)}`);
      setLoading(false);
    }
  };

  if(loading) return(
    <div className="loading-page">
      <div className="spinner"/>
      <p className="loading-text">{LOADING_STEPS[lstep]}...</p>
      <div className="loading-steps">
        {LOADING_STEPS.map((s,i)=>(
          <div key={i} className={`l-step ${i<lstep?'done':i===lstep?'active':''}`}>
            <span className="l-dot"/><span>{s}</span>
          </div>
        ))}
      </div>
    </div>
  );

  return(
    <div className="form-page">
      <div className="form-page-header">
        <div className="form-page-logo" onClick={onBack}>과목<span>나침반</span></div>
        <button className="form-page-back" onClick={onBack}>← 돌아가기</button>
      </div>
      <div className="form-hero">
        <div className="form-eyebrow">2022 개정 교육과정 · 고교학점제</div>
        <h1 className="form-title">진로가 정해지면<br/><span>과목은 AI가 설계합니다</span></h1>
        <p className="form-tagline">학년·진로·전공을 입력하면 맞춤 선택과목과 세특 탐구 주제까지 한번에</p>
      </div>
      <div className="form-body">
        <div className="form-card">
          <div className="form-row">
            <div className="f-group">
              <label className="f-label">학년<span className="req">*</span></label>
              <select className="f-control" value={form.grade} onChange={set('grade')}>
                <option value="1">고1</option>
                <option value="2">고2</option>
              </select>
            </div>
            <div className="f-group">
              <label className="f-label">희망 진로<span className="req">*</span></label>
              <input className="f-control" placeholder="예: 의사, 소프트웨어 엔지니어…" value={form.career} onChange={set('career')}/>
            </div>
            <div className="f-group">
              <label className="f-label">희망 전공<span className="req">*</span></label>
              <input className="f-control" placeholder="예: 의학과, 컴퓨터공학과…" value={form.major} onChange={set('major')}/>
            </div>
          </div>
          <div className="f-full">
            <label className="f-label">희망 대학 <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'rgba(242,234,216,.28)'}}>선택 — 해당 대학 권장 과목 반영</span></label>
            <input className="f-control" placeholder="예: 서울대, 연세대, 성균관대…" value={form.university} onChange={set('university')}/>
          </div>
          <button className="f-submit" onClick={submit} disabled={!valid}>추천받기 →</button>
          {error&&<div className="f-error">{error}</div>}
        </div>
      </div>
    </div>
  );
}

function PrioritySection({priority, subjects}){
  const meta=PRIORITY_META[priority];
  const list=subjects.filter(s=>s.priority===priority);
  if(!list.length) return null;
  return(
    <div className="priority-section">
      <div className="priority-header">
        <span className={`p-badge pb-${priority}`}>{priority}</span>
        <span className="p-desc">{meta.desc}</span>
        <span className="p-count">{list.length}과목</span>
      </div>
      <div className={`scards-${priority}`}>
        {list.map((s,i)=>(
          <div key={i} className={`scard scard-${priority}`}>
            <div className="scard-top">
              <span className="sname">{s.name}</span>
              <span className={catClass(s.category)}>{s.category}</span>
            </div>
            <p className="sreason">{s.reason}</p>
            <div className="ext-label">세특 탐구 주제</div>
            <ul className="ext-list">
              {(s.extracurricular||[]).map((t,j)=>(
                <li key={j} className="ext-item"><span className="ext-dot"/>{t}</li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}

function ResultsPage({results, form, onBack, onNew}){
  const [toast, setToast] = useState(false);
  const [modal, setModal] = useState(null);
  const shareUrl = getShareUrl({results, form});

  const copyLink=()=>{
    if(!shareUrl) return;
    navigator.clipboard.writeText(shareUrl).then(()=>{
      setToast(true);
      setTimeout(()=>setToast(false),2200);
    });
  };

  return(
    <div className="results-page">
      <div className="form-page-header">
        <div className="form-page-logo" onClick={onNew}>과목<span>나침반</span></div>
        <div style={{display:'flex',gap:8}}>
          <button className="form-page-back" onClick={onNew}>← 처음으로</button>
        </div>
      </div>
      <div className="results-body">
        <div className="results-inner">
          <div className="results-top">
            <div>
              <h2 className="results-title-main">맞춤 과목 추천 결과</h2>
              <div className="chips">
                <span className="chip">고{form.grade}</span>
                <span className="chip">{form.career}</span>
                <span className="chip">{form.major}</span>
                {form.university&&<span className="chip">{form.university}</span>}
              </div>
            </div>
            <div className="r-btns">
              <button className="r-btn-link" onClick={copyLink}>🔗 링크 복사</button>
              <button className="r-btn-pdf" onClick={()=>window.print()}>📄 PDF 저장</button>
              <button className="r-btn-back" onClick={onBack}>↩ 다시 입력</button>
            </div>
          </div>

          {shareUrl&&(
            <div className="link-box">
              <span className="link-box-label">🔗 공유 링크</span>
              <div className="link-box-url">{shareUrl}</div>
              <button className="link-box-copy" onClick={copyLink}>복사</button>
            </div>
          )}

          <div className="strategy-box">
            <div className="strategy-label">과목 선택 전략</div>
            <p className="strategy-text">{results.overall_strategy}</p>
          </div>

          {['필수','추천','선택'].map(p=>(
            <PrioritySection key={p} priority={p} subjects={results.subjects||[]}/>
          ))}

          <div className="result-footer">
            2022 개정 교육과정 기준 · 권장과목은 대학·학과별로 매년 변경됩니다 · 각 대학 입학처에서 최신 정보를 확인하세요 · 필탑학원
          </div>
        </div>
      </div>
      {toast&&<div className="toast">✓ 링크가 복사되었습니다</div>}
    </div>
  );
}

function App(){
  const [page, setPage] = useState('landing'); // landing | form | results
  const [resultData, setResultData] = useState(null);

  // URL 해시에서 결과 복원
  useEffect(()=>{
    const hash = location.hash;
    if(hash.startsWith('#r=')){
      const decoded = decodeResults(hash.slice(3));
      if(decoded&&decoded.results&&decoded.form){
        setResultData(decoded);
        setPage('results');
      }
    }
  },[]);

  const goStart=()=>{ setPage('form'); window.scrollTo(0,0); };
  const goLanding=()=>{ setPage('landing'); window.scrollTo(0,0); history.pushState('','',location.pathname); };
  const goResult=(data)=>{
    setResultData(data);
    setPage('results');
    // URL 업데이트
    const url = getShareUrl(data);
    if(url) history.pushState('','',url);
    window.scrollTo(0,0);
  };

  if(page==='landing') return <LandingPage onStart={goStart}/>;
  if(page==='form') return <FormPage onBack={goLanding} onResult={goResult}/>;
  if(page==='results'&&resultData) return <ResultsPage results={resultData.results} form={resultData.form} onBack={()=>setPage('form')} onNew={goLanding}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
