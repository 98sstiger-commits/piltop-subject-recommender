<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>큐리큘라 — 선택과목 AI 설계</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g1:#0b1f12;
      --g2:#112519;
      --g3:#163520;
      --g4:#08160d;
      --cream:#f0e8d4;
      --gold:#b89530;        /* 파인드림과 동일한 차분한 골드 */
      --gold2:#c9a843;
      --text:#1a1a1a;--muted:#6b6460;
      --dc:rgba(240,232,212,0.58);--db:rgba(240,232,212,0.1);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:#fff;color:var(--text)}

    /* ══ LANDING HERO ══ */
    .l-hero{
      background:var(--g1);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:60px 24px 80px;position:relative;overflow:hidden;
    }
    .l-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 55% at 50% 38%,rgba(25,70,35,0.45),transparent);pointer-events:none}
    .l-hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:rgba(240,232,212,.55);margin-bottom:28px;position:relative;z-index:2}
    .l-hero-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
    .l-hero-title{font-size:clamp(80px,12vw,148px);font-weight:900;color:var(--cream);line-height:1.0;letter-spacing:-4px;margin-bottom:48px;position:relative;z-index:2}
    .l-hero-btn{padding:20px 72px;background:#fff;border:none;border-radius:14px;color:var(--g1);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s;position:relative;z-index:10;box-shadow:0 4px 24px rgba(0,0,0,.3)}
    .l-hero-btn:hover{background:#f0ece4}
    .l-hero-btn:active{transform:scale(.97)}

    /* ══ TUTORIAL NAV ══ */
    .l-tut-bar{background:#fff;border-bottom:1px solid #e5dfd4;padding:0 48px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .l-tut-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
    .l-tut-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
    .l-tut-steps{display:flex;gap:24px}
    .l-tut-step{font-size:12px;color:#bbb;white-space:nowrap;cursor:pointer;transition:color .2s;text-decoration:none}
    .l-tut-step:hover{color:var(--text)}
    .l-tut-step-num{font-weight:700;color:#ccc;margin-right:4px;font-size:11px}

    /* ══ INTRO (dark, 파인드림 동일) ══ */
    .l-intro{background:var(--g2);padding:80px 72px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;overflow:hidden}
    .l-intro::after{content:'';position:absolute;right:-80px;top:50%;transform:translateY(-50%);width:480px;height:480px;border:1px solid rgba(240,232,212,.04);border-radius:50%;box-shadow:0 0 0 60px rgba(240,232,212,.018),0 0 0 120px rgba(240,232,212,.012),0 0 0 180px rgba(240,232,212,.007);pointer-events:none}
    .l-intro-eyebrow{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px}
    .l-intro-title{font-size:clamp(52px,6vw,78px);font-weight:900;color:var(--cream);line-height:1.0;letter-spacing:-3px;margin-bottom:14px}
    .l-intro-tagline{font-size:16px;color:rgba(240,232,212,.5);margin-bottom:20px}
    .l-intro-desc{font-size:15px;color:rgba(240,232,212,.58);line-height:1.9}
    .l-intro-desc strong{color:var(--cream)}
    .l-stats{display:flex;gap:40px;flex-wrap:wrap;align-items:flex-end}
    .l-stat-num{font-size:clamp(48px,5vw,70px);font-weight:900;color:var(--gold);line-height:1;letter-spacing:-2px}
    .l-stat-label{font-size:13px;color:rgba(240,232,212,.4);margin-top:6px;white-space:nowrap}

    /* ══ HOW SECTION ══ */
    .l-how{padding:80px 72px;background:#fff}
    .l-how-inner{max-width:1000px;margin:0 auto}
    .l-sec-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
    .l-sec-title{font-size:clamp(28px,4vw,40px);font-weight:900;color:var(--text);letter-spacing:-1.5px;margin-bottom:8px}
    .l-sec-sub{font-size:15px;color:var(--muted);line-height:1.8;max-width:560px;margin-bottom:56px}
    .l-step{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-bottom:88px;scroll-margin-top:60px}
    .l-step:last-child{margin-bottom:0}
    .l-step.rev{direction:rtl}
    .l-step.rev>*{direction:ltr}
    .l-step-num-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .l-step-num{width:38px;height:38px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:15px;font-weight:900;flex-shrink:0}
    .l-step-lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.12em;text-transform:uppercase}
    .l-step-title{font-size:clamp(22px,3vw,32px);font-weight:900;color:var(--text);line-height:1.2;letter-spacing:-1px;margin-bottom:14px}
    .l-step-desc{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:16px}
    .l-step-pts{list-style:none;display:flex;flex-direction:column;gap:9px}
    .l-step-pt{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text)}
    .l-step-chk{width:20px;height:20px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:10px;flex-shrink:0;margin-top:1px}
    .l-tip{background:rgba(184,149,48,.07);border:1px solid rgba(184,149,48,.16);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:12px;color:var(--muted);line-height:1.75}
    .l-tip strong{color:#8a6e1a;font-weight:700}

    /* MOCKUP */
    .l-mock{background:var(--g2);border-radius:16px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
    .l-mock-bar{display:flex;gap:6px;margin-bottom:14px}
    .l-mock-dot{width:10px;height:10px;border-radius:50%}
    .l-mock-ey{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;text-align:center;margin-bottom:6px}
    .l-mock-ttl{font-size:20px;font-weight:900;color:var(--cream);text-align:center;margin-bottom:2px;letter-spacing:-1px}
    .l-mock-sub{font-size:11px;color:rgba(240,232,212,.3);text-align:center;margin-bottom:16px}
    .l-mock-card{background:rgba(255,255,255,.06);border:1px solid rgba(240,232,212,.08);border-radius:10px;padding:13px}
    .l-mock-lbl{font-size:10px;color:rgba(240,232,212,.3);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .l-mock-inp{background:rgba(255,255,255,.07);border:1px solid rgba(184,149,48,.22);border-radius:7px;padding:9px 12px;color:var(--cream);font-size:13px;width:100%;margin-bottom:8px;font-family:inherit}
    .l-mock-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:var(--g1);font-size:14px;font-weight:800;text-align:center;font-family:inherit}
    .l-mock-res{background:rgba(255,255,255,.05);border:1px solid rgba(240,232,212,.07);border-radius:10px;overflow:hidden}
    .l-mock-res-hd{background:rgba(184,149,48,.1);padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
    .l-mock-res-tag{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.06em}
    .l-mock-res-bd{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
    .l-mock-sc{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:8px;padding:9px 11px}
    .l-mock-sc-n{font-size:13px;font-weight:700;color:var(--cream)}
    .l-mock-sc-c{font-size:10px;color:rgba(240,232,212,.28);margin-top:2px}
    .l-mock-bdg{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .bdg-필수{background:#DC2626;color:#fff}
    .bdg-추천{background:rgba(184,149,48,.88);color:var(--g1)}
    .bdg-선택{background:rgba(255,255,255,.12);color:rgba(240,232,212,.8)}
    .l-mock-lnk{background:rgba(255,255,255,.05);border:1px solid rgba(184,149,48,.2);border-radius:10px;padding:13px}
    .l-mock-lnk-row{display:flex;gap:8px;align-items:center;margin-top:8px}
    .l-mock-lnk-url{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(240,232,212,.07);border-radius:6px;padding:7px 10px;color:rgba(240,232,212,.32);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .l-mock-copy{padding:7px 12px;background:var(--gold);border:none;border-radius:6px;color:var(--g1);font-size:11px;font-weight:700;white-space:nowrap;font-family:inherit}

    /* ══ CTA ══ */
    .l-cta{background:var(--g2);padding:80px 48px;text-align:center;position:relative;overflow:hidden}
    .l-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 80% at 50% 100%,rgba(25,70,35,.5),transparent);pointer-events:none}
    .l-cta-title{font-size:clamp(28px,4vw,44px);font-weight:900;color:var(--cream);letter-spacing:-1.5px;margin-bottom:12px;position:relative;z-index:1}
    .l-cta-title em{color:var(--gold);font-style:normal}
    .l-cta-sub{font-size:15px;color:var(--dc);margin-bottom:36px;line-height:1.8;position:relative;z-index:1}
    .l-cta-btn{padding:16px 52px;background:var(--gold);border:none;border-radius:12px;color:var(--g1);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s;position:relative;z-index:1}
    .l-cta-btn:hover{background:var(--gold2)}

    /* ══ FOOTER ══ */
    .l-footer{background:var(--g4);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .l-footer-logo{font-size:14px;font-weight:800;color:rgba(240,232,212,.4)}
    .l-footer-logo em{color:var(--gold);font-style:normal}
    .l-footer-copy{font-size:12px;color:rgba(240,232,212,.18)}

    /* ══ FORM PAGE — 파인드림 대시보드 스타일 ══ */
    .fp{min-height:100vh;background:var(--g1);display:flex;flex-direction:column}

    /* 상단 헤더 다크 섹션 */
    .fp-top{background:var(--g2);padding:40px 48px 100px;text-align:center;position:relative}
    .fp-top::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(25,70,35,.4),transparent);pointer-events:none}
    .fp-ey{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;position:relative;z-index:1}
    .fp-ttl{font-size:clamp(38px,6vw,64px);font-weight:900;color:var(--cream);line-height:1.0;letter-spacing:-2px;margin-bottom:8px;position:relative;z-index:1}
    .fp-sub{font-size:14px;color:rgba(240,232,212,.45);position:relative;z-index:1}

    /* 백 버튼 */
    .fp-back-btn{position:absolute;top:20px;left:24px;background:none;border:none;color:rgba(240,232,212,.45);font-size:13px;cursor:pointer;font-family:inherit;transition:color .15s;z-index:10;display:flex;align-items:center;gap:6px}
    .fp-back-btn:hover{color:var(--cream)}

    /* 로고 */
    .fp-logo{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:800;color:var(--cream);z-index:10;cursor:pointer;white-space:nowrap}
    .fp-logo em{color:var(--gold);font-style:normal}

    /* 플로팅 카드 — 파인드림과 동일 */
    .fp-card-wrap{padding:0 24px 60px;margin-top:-60px;display:flex;justify-content:center;position:relative;z-index:10}
    .fp-card{max-width:680px;width:100%;background:#fff;border-radius:20px;padding:32px 28px 28px;box-shadow:0 8px 40px rgba(0,0,0,.18)}

    .fp-card-title{font-size:15px;font-weight:700;color:var(--text);text-align:center;margin-bottom:20px}
    .fp-row{display:grid;grid-template-columns:110px 1fr 1fr;gap:12px;margin-bottom:12px}
    .fp-grp{display:flex;flex-direction:column}
    .fp-lbl{font-size:12px;font-weight:600;color:#888;margin-bottom:6px}
    .req{color:var(--gold);margin-left:2px}
    .fp-ctrl{background:#f8f6f2;border:1.5px solid #e5dfd4;border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;width:100%}
    .fp-ctrl:focus{border-color:var(--g2);background:#fff}
    .fp-ctrl::placeholder{color:#bbb}
    select.fp-ctrl option{background:#fff;color:var(--text)}
    .fp-full{margin-bottom:20px}
    .fp-full-lbl{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;display:block}
    .fp-submit{width:100%;padding:14px;background:var(--gold);border:none;border-radius:12px;color:var(--g1);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s}
    .fp-submit:hover:not(:disabled){background:var(--gold2)}
    .fp-submit:disabled{opacity:.35;cursor:not-allowed}
    .fp-err{margin-top:12px;padding:11px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:13px;line-height:1.6}

    /* ══ LOADING ══ */
    .ld{background:var(--g1);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .spinner{width:42px;height:42px;border:3px solid rgba(184,149,48,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ld-text{color:var(--cream);font-size:15px;font-weight:600}
    .ld-steps{display:flex;flex-direction:column;gap:7px;margin-top:8px}
    .ld-step{font-size:12px;display:flex;align-items:center;gap:7px;color:rgba(240,232,212,.2);transition:color .4s}
    .ld-step.active{color:var(--gold)}
    .ld-step.done{color:rgba(86,196,122,.7)}
    .ld-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

    /* ══ RESULTS ══ */
    .rp{background:var(--g1);min-height:100vh;display:flex;flex-direction:column}

    /* 결과 상단 헤더 — 파인드림 스타일 */
    .rp-top-section{background:var(--g2);padding:32px 48px 80px;text-align:center;position:relative}
    .rp-top-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(25,70,35,.4),transparent);pointer-events:none}
    .rp-ey{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;position:relative;z-index:1}
    .rp-hd-ttl{font-size:clamp(32px,5vw,52px);font-weight:900;color:var(--cream);letter-spacing:-2px;margin-bottom:6px;position:relative;z-index:1}
    .rp-hd-sub{font-size:13px;color:rgba(240,232,212,.42);position:relative;z-index:1;margin-bottom:24px}

    /* 통계 카드 3개 */
    .rp-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:600px;margin:0 auto;position:relative;z-index:1}
    .rp-stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(240,232,212,.08);border-radius:12px;padding:16px 20px;text-align:center}
    .rp-stat-num{font-size:32px;font-weight:900;color:var(--cream);line-height:1}
    .rp-stat-num.red{color:#DC2626}
    .rp-stat-num.amber{color:var(--gold)}
    .rp-stat-label{font-size:12px;color:rgba(240,232,212,.4);margin-top:4px}

    /* 플로팅 결과 카드 */
    .rp-card-wrap{padding:0 24px 60px;margin-top:-48px;position:relative;z-index:10}
    .rp-card{max-width:960px;margin:0 auto;background:#fff;border-radius:20px;padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.18)}

    .rp-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:4px 12px;background:#f5f0e6;border:1px solid #e0d8c0;color:#7a6228;border-radius:20px;font-size:12px;font-weight:600}
    .rp-btns{display:flex;gap:8px;flex-wrap:wrap}
    .rb-link{padding:8px 15px;background:var(--g2);border:none;border-radius:8px;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
    .rb-link:hover{background:var(--g3)}
    .rb-pdf{padding:8px 15px;background:var(--gold);border:none;border-radius:8px;color:var(--g1);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
    .rb-pdf:hover{background:var(--gold2)}
    .rb-back{padding:8px 15px;background:#f5f0e6;border:1px solid #e0d8c0;border-radius:8px;color:#7a6228;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}

    /* 링크 박스 */
    .link-box{background:#fdf8ee;border:1px solid #e8d898;border-radius:12px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .lb-label{font-size:11px;font-weight:700;color:#8a6e1a;white-space:nowrap}
    .lb-url{flex:1;font-size:12px;color:#7a6228;background:#fff;border:1px solid #e8d898;border-radius:7px;padding:6px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .lb-copy{padding:6px 13px;background:var(--gold);border:none;border-radius:7px;color:var(--g1);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

    .strat{background:#f8f5ec;border:1px solid #e0d8c0;border-radius:12px;padding:18px 22px;margin-bottom:20px}
    .strat-lbl{font-size:10px;font-weight:800;color:#8a6e1a;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
    .strat-txt{font-size:14px;line-height:1.85;color:var(--text)}

    .psec{margin-bottom:20px}
    .phdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:9px;border-bottom:1.5px solid #f0ebe0}
    .pbdg{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800}
    .pb-필수{background:#DC2626;color:#fff}
    .pb-추천{background:var(--gold);color:var(--g1)}
    .pb-선택{background:#f0ebe0;color:#7a6228}
    .pdsc{font-size:12px;color:#999}
    .pcnt{margin-left:auto;font-size:12px;color:#bbb}
    .sc-필수{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .sc-추천{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .sc-선택{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .scard{background:#fafaf8;border:1px solid #ede8de;border-radius:14px;padding:16px;transition:transform .2s,box-shadow .2s}
    .scard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .sc-필수 .scard{border-left:3px solid #DC2626}
    .sc-추천 .scard{border-left:3px solid var(--gold)}
    .sc-선택 .scard{border-left:3px solid #d0c8b4}
    .sc-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .sname{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}
    .cat{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
    .cat-g{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
    .cat-c{background:#fdf8ee;color:#8a6e1a;border:1px solid #e8d898}
    .cat-f{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

  const [loading,setLoading]=useState(false);
  const [lstep,setLstep]=useState(0);
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const valid=form.career.trim()&&form.major.trim();

  const submit=async()=>{
    setLoading(true);setError(null);setLstep(0);
    const t=setInterval(()=>setLstep(s=>s<LSTEPS.length-1?s+1:s),2400);
    try{
      const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:SYSTEM,
          messages:[{role:'user',content:`고${form.grade}학년, 희망진로:${form.career}, 희망전공:${form.major}${form.university?`, 희망대학:${form.university}`:''}`}]})});
      const data=await res.json();
      if(!res.ok) throw new Error(data?.error?.message||data?.error||`오류 ${res.status}`);
      const raw=data.content[0].text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      clearInterval(t);onResult({results:JSON.parse(raw),form});
    }catch(e){clearInterval(t);setError(`오류: ${String(e.message)}`);setLoading(false);}
  };

  if(loading) return(
    <div className="ld">
      <div className="spinner"/>
      <p className="ld-text">{LSTEPS[lstep]}...</p>
      <div className="ld-steps">{LSTEPS.map((s,i)=>(
        <div key={i} className={`ld-step ${i<lstep?'done':i===lstep?'active':''}`}><span className="ld-dot"/><span>{s}</span></div>
      ))}</div>
    </div>
  );

  return(
    <div className="fp">
      <div className="fp-top">
        <button className="fp-back-btn" onClick={onBack}>← 돌아가기</button>
        <div className="fp-logo" onClick={onBack}><em>큐리큘라</em></div>
        <div className="fp-ey">SUBJECT RECOMMENDER</div>
        <h1 className="fp-ttl">큐리큘라</h1>
        <p className="fp-sub">진로 맞춤 선택과목 AI 설계</p>
      </div>
      <div className="fp-card-wrap">
        <div className="fp-card">
          <div className="fp-card-title">학년 · 진로 · 전공을 입력해주세요</div>
          <div className="fp-row">
            <div className="fp-grp"><label className="fp-lbl">학년<span className="req">*</span></label><select className="fp-ctrl" value={form.grade} onChange={set('grade')}><option value="1">고1</option><option value="2">고2</option></select></div>
            <div className="fp-grp"><label className="fp-lbl">희망 진로<span className="req">*</span></label><input className="fp-ctrl" placeholder="예: 의사, 소프트웨어 엔지니어…" value={form.career} onChange={set('career')}/></div>
            <div className="fp-grp"><label className="fp-lbl">희망 전공<span className="req">*</span></label><input className="fp-ctrl" placeholder="예: 의학과, 컴퓨터공학과…" value={form.major} onChange={set('major')}/></div>
          </div>
          <div className="fp-full">
            <label className="fp-full-lbl">희망 대학 <span style={{fontWeight:400,color:'#bbb'}}>선택 — 해당 대학 권장 과목 반영</span></label>
            <input className="fp-ctrl" placeholder="예: 서울대, 연세대, 성균관대…" value={form.university} onChange={set('university')}/>
          </div>
          <button className="fp-submit" onClick={submit} disabled={!valid}>추천받기 →</button>
          {error&&<div className="fp-err">{error}</div>}
        </div>
      </div>
    </div>
  );
}

function PSection({priority,subjects}){
  const list=subjects.filter(s=>s.priority===priority);
  if(!list.length) return null;
  return(
    <div className="psec">
      <div className="phdr"><span className={`pbdg pb-${priority}`}>{priority}</span><span className="pdsc">{PMETA[priority].desc}</span><span className="pcnt">{list.length}과목</span></div>
      <div className={`sc-${priority}`}>
        {list.map((s,i)=>(
          <div key={i} className="scard">
            <div className="sc-top"><span className="sname">{s.name}</span><span className={catClass(s.category)}>{s.category}</span></div>
            <p className="sreason">{s.reason}</p>
            <div className="ext-lbl">세특 탐구 주제</div>
            <ul className="ext-list">{(s.extracurricular||[]).map((t,j)=>(<li key={j} className="ext-item"><span className="ext-dot"/>{t}</li>))}</ul>
          </div>
        ))}
      </div>
    </div>
  );
}

function ResultsPage({results,form,onBack,onNew}){
  const [toast,setToast]=useState(false);
  const url=mkUrl({results,form});
  const copy=()=>{if(!url)return;navigator.clipboard.writeText(url).then(()=>{setToast(true);setTimeout(()=>setToast(false),2200);});};
  const total=(results.subjects||[]).length;
  const 필수cnt=(results.subjects||[]).filter(s=>s.priority==='필수').length;
  const 추천cnt=(results.subjects||[]).filter(s=>s.priority==='추천').length;

  return(
    <div className="rp">
      <div className="rp-top-section">
        <button className="rp-home-btn" onClick={onNew}>← 처음으로</button>
        <div className="rp-ey">SUBJECT RECOMMENDER</div>
        <div className="rp-hd-ttl">큐리큘라</div>
        <div className="rp-hd-sub">맞춤 과목 추천 결과 대시보드</div>
        <div className="rp-stat-row">
          <div className="rp-stat-card"><div className="rp-stat-num">{total}</div><div className="rp-stat-label">전체 과목</div></div>
          <div className="rp-stat-card"><div className="rp-stat-num red">{필수cnt}</div><div className="rp-stat-label">필수</div></div>
          <div className="rp-stat-card"><div className="rp-stat-num amber">{추천cnt}</div><div className="rp-stat-label">추천</div></div>
        </div>
      </div>
      <div className="rp-card-wrap">
        <div className="rp-card">
          <div className="rp-card-top">
            <div><div className="chips"><span className="chip">고{form.grade}</span><span className="chip">{form.career}</span><span className="chip">{form.major}</span>{form.university&&<span className="chip">{form.university}</span>}</div></div>
            <div className="rp-btns">
              <button className="rb-link" onClick={copy}>🔗 링크 복사</button>
              <button className="rb-pdf" onClick={()=>window.print()}>📄 PDF 저장</button>
              <button className="rb-back" onClick={onBack}>↩ 다시 입력</button>
            </div>
          </div>
          {url&&<div className="link-box"><span className="lb-label">🔗 공유 링크</span><div className="lb-url">{url}</div><button className="lb-copy" onClick={copy}>복사</button></div>}
          <div className="strat"><div className="strat-lbl">과목 선택 전략</div><p className="strat-txt">{results.overall_strategy}</p></div>
          {['필수','추천','선택'].map(p=><PSection key={p} priority={p} subjects={results.subjects||[]}/>)}
          <div className="rp-footer">2022 개정 교육과정 기준 · 권장과목은 대학·학과별로 매년 변경됩니다 · 각 대학 입학처에서 최신 정보를 확인하세요 · 필탑학원</div>
        </div>
      </div>
      {toast&&<div className="toast">✓ 링크가 복사되었습니다</div>}
    </div>
  );
}

function App(){
  const [page,setPage]=useState('landing');
  const [rdata,setRdata]=useState(null);
  useEffect(()=>{const h=location.hash;if(h.startsWith('#r=')){const d=dec(h.slice(3));if(d?.results&&d?.form){setRdata(d);setPage('results');}}},[]);
  const goForm=()=>{setPage('form');window.scrollTo(0,0);};
  const goHome=()=>{setPage('landing');window.scrollTo(0,0);history.pushState('','',location.pathname);};
  const goResult=d=>{setRdata(d);setPage('results');const u=mkUrl(d);if(u)history.pushState('','',u);window.scrollTo(0,0);};
  if(page==='landing') return <Landing onStart={goForm}/>;
  if(page==='form') return <FormPage onBack={goHome} onResult={goResult}/>;
  if(page==='results'&&rdata) return <ResultsPage results={rdata.results} form={rdata.form} onBack={()=>setPage('form')} onNew={goHome}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
