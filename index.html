<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>큐리큘라 — 선택과목 AI 설계</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:#163d25;--g2:#0f2d1a;--g3:#0b2015;
      --cream:#f5f0e6;--cream2:#ede8d8;
      --gold:#c9a843;--gold2:#d4b95a;
      --text:#1a1a1a;--muted:#6b6460;
      --dg-cream:rgba(242,234,216,0.6);--dg-border:rgba(242,234,216,0.12);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:#fff;color:var(--text)}

    /* ══ LANDING ══ */

    /* HERO — 파인드림과 동일한 단순 구조 */
    .l-hero{
      background:var(--g3);
      min-height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;padding:40px 24px;
      position:relative;
    }
    .l-hero-badge{
      display:inline-flex;align-items:center;gap:7px;
      font-size:13px;color:rgba(242,234,216,.65);
      margin-bottom:24px;letter-spacing:.02em;
    }
    .l-hero-badge-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
    .l-hero-title{
      font-size:clamp(64px,10vw,120px);
      font-weight:900;color:#fff;
      line-height:1.0;letter-spacing:-4px;
      margin-bottom:36px;
    }
    .l-hero-btn{
      padding:18px 56px;
      background:#fff;border:none;border-radius:14px;
      color:var(--g3);font-size:18px;font-weight:700;
      cursor:pointer;font-family:inherit;
      transition:background .15s,transform .1s;
      position:relative;z-index:10;
    }
    .l-hero-btn:hover{background:#f0ede6}
    .l-hero-btn:active{transform:scale(.97)}

    /* TUTORIAL NAV BAR */
    .l-tut-bar{
      background:#fff;border-bottom:1px solid #e8e2d8;
      padding:0 48px;height:52px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .l-tut-bar-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
    .l-tut-bar-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
    .l-tut-bar-steps{display:flex;gap:20px}
    .l-tut-step{font-size:12px;color:#aaa;white-space:nowrap}
    .l-tut-step span{font-weight:700;color:#ccc;margin-right:4px}

    /* INTRO SECTION (dark) */
    .l-intro{
      background:var(--g);
      padding:80px 48px;
      display:grid;grid-template-columns:1fr 1fr;
      gap:60px;align-items:center;
    }
    .l-intro-left{}
    .l-intro-eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
    .l-intro-title{font-size:clamp(36px,4vw,56px);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-2px;margin-bottom:18px}
    .l-intro-desc{font-size:15px;color:var(--dg-cream);line-height:1.85}
    .l-intro-right{display:flex;flex-direction:column;gap:10px}
    .l-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .l-stat{text-align:center;padding:16px;background:rgba(255,255,255,.06);border:1px solid var(--dg-border);border-radius:12px}
    .l-stat-num{font-size:clamp(32px,4vw,48px);font-weight:900;color:var(--gold);line-height:1}
    .l-stat-label{font-size:12px;color:rgba(242,234,216,.45);margin-top:4px}

    /* HOW SECTION */
    .l-how{padding:80px 48px;background:#fff}
    .l-how-inner{max-width:1000px;margin:0 auto}
    .l-sec-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
    .l-sec-title{font-size:clamp(28px,4vw,40px);font-weight:900;color:var(--text);letter-spacing:-1.5px;margin-bottom:8px}
    .l-sec-sub{font-size:15px;color:var(--muted);line-height:1.8;max-width:560px;margin-bottom:52px}

    .l-step{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:80px}
    .l-step:last-child{margin-bottom:0}
    .l-step.rev{direction:rtl}
    .l-step.rev>*{direction:ltr}

    .l-step-num-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .l-step-num{width:36px;height:36px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;font-weight:900;flex-shrink:0}
    .l-step-lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.12em;text-transform:uppercase}
    .l-step-title{font-size:clamp(22px,3vw,32px);font-weight:900;color:var(--text);line-height:1.2;letter-spacing:-1px;margin-bottom:14px}
    .l-step-desc{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:16px}
    .l-step-pts{list-style:none;display:flex;flex-direction:column;gap:8px}
    .l-step-pt{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text)}
    .l-step-chk{width:20px;height:20px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:10px;flex-shrink:0;margin-top:1px}
    .l-tip{background:rgba(201,168,67,.07);border:1px solid rgba(201,168,67,.18);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:12px;color:var(--muted);line-height:1.7}
    .l-tip strong{color:#8a6e1a;font-weight:700}

    /* MOCKUP */
    .l-mock{background:var(--g);border-radius:16px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.15)}
    .l-mock-bar{display:flex;gap:6px;margin-bottom:14px}
    .l-mock-dot{width:10px;height:10px;border-radius:50%}
    .l-mock-ey{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-bottom:6px}
    .l-mock-ttl{font-size:22px;font-weight:900;color:#fff;text-align:center;margin-bottom:2px;letter-spacing:-1px}
    .l-mock-sub{font-size:11px;color:rgba(242,234,216,.35);text-align:center;margin-bottom:18px}
    .l-mock-card{background:rgba(255,255,255,.06);border:1px solid rgba(242,234,216,.1);border-radius:10px;padding:14px}
    .l-mock-lbl{font-size:10px;color:rgba(242,234,216,.35);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .l-mock-inp{background:rgba(255,255,255,.08);border:1px solid rgba(201,168,67,.28);border-radius:7px;padding:9px 12px;color:#fff;font-size:13px;width:100%;margin-bottom:8px;font-family:inherit}
    .l-mock-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:var(--g3);font-size:14px;font-weight:800;text-align:center;font-family:inherit;cursor:default}

    .l-mock-res{background:rgba(255,255,255,.06);border:1px solid rgba(242,234,216,.1);border-radius:10px;overflow:hidden}
    .l-mock-res-hd{background:rgba(201,168,67,.1);padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
    .l-mock-res-tag{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.06em}
    .l-mock-res-bd{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
    .l-mock-sc{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:8px;padding:9px 11px}
    .l-mock-sc-n{font-size:13px;font-weight:700;color:#fff}
    .l-mock-sc-c{font-size:10px;color:rgba(242,234,216,.35);margin-top:2px}
    .l-mock-bdg{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .bdg-필수{background:#DC2626;color:#fff}
    .bdg-추천{background:rgba(201,168,67,.9);color:var(--g3)}
    .bdg-선택{background:rgba(255,255,255,.12);color:rgba(242,234,216,.8)}

    .l-mock-lnk{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,67,.25);border-radius:10px;padding:13px}
    .l-mock-lnk-row{display:flex;gap:8px;align-items:center;margin-top:8px}
    .l-mock-lnk-url{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(242,234,216,.1);border-radius:6px;padding:7px 10px;color:rgba(242,234,216,.4);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .l-mock-copy{padding:7px 12px;background:var(--gold);border:none;border-radius:6px;color:var(--g3);font-size:11px;font-weight:700;white-space:nowrap;font-family:inherit}

    /* CTA */
    .l-cta{background:var(--g);padding:80px 48px;text-align:center}
    .l-cta-title{font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:12px}
    .l-cta-title em{color:var(--gold);font-style:normal}
    .l-cta-sub{font-size:15px;color:var(--dg-cream);margin-bottom:36px;line-height:1.8}
    .l-cta-btn{padding:15px 52px;background:var(--gold);border:none;border-radius:12px;color:var(--g3);font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s}
    .l-cta-btn:hover{background:var(--gold2)}

    /* FOOTER */
    .l-footer{background:var(--g3);padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .l-footer-logo{font-size:14px;font-weight:800;color:rgba(242,234,216,.5)}
    .l-footer-logo em{color:var(--gold);font-style:normal}
    .l-footer-copy{font-size:12px;color:rgba(242,234,216,.25)}

    /* ══ FORM PAGE ══ */
    .fp{background:var(--g3);min-height:100vh;display:flex;flex-direction:column}
    .fp-header{background:var(--g);border-bottom:1px solid var(--dg-border);padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .fp-logo{font-size:16px;font-weight:800;color:#fff;cursor:pointer;letter-spacing:-.3px}
    .fp-logo em{color:var(--gold);font-style:normal}
    .fp-back{font-size:13px;color:var(--dg-cream);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s}
    .fp-back:hover{color:#fff}
    .fp-hero{background:var(--g);padding:48px 24px 56px;text-align:center;border-bottom:1px solid var(--dg-border)}
    .fp-ey{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
    .fp-title{font-size:clamp(26px,4vw,40px);font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:8px}
    .fp-title em{color:var(--gold);font-style:normal}
    .fp-sub{font-size:14px;color:var(--dg-cream);line-height:1.8}
    .fp-body{flex:1;padding:36px 24px 64px;display:flex;justify-content:center}
    .fp-card{max-width:660px;width:100%;background:rgba(255,255,255,.05);border:1px solid var(--dg-border);border-radius:18px;padding:26px 22px 20px}
    .fp-row{display:grid;grid-template-columns:110px 1fr 1fr;gap:10px;margin-bottom:10px}
    .fp-grp{display:flex;flex-direction:column}
    .fp-lbl{font-size:11px;font-weight:700;color:var(--dg-cream);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase}
    .req{color:var(--gold);margin-left:2px}
    .fp-ctrl{background:rgba(255,255,255,.07);border:1px solid var(--dg-border);border-radius:9px;color:#fff;padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;width:100%}
    .fp-ctrl:focus{border-color:var(--gold)}
    .fp-ctrl::placeholder{color:rgba(242,234,216,.22)}
    select.fp-ctrl option{background:#1a3a28;color:#fff}
    .fp-full{margin-bottom:18px}
    .fp-sub-lbl{font-weight:400;text-transform:none;letter-spacing:0;color:rgba(242,234,216,.25)}
    .fp-submit{width:100%;padding:13px;background:var(--gold);border:none;border-radius:10px;color:var(--g3);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s}
    .fp-submit:hover:not(:disabled){background:var(--gold2)}
    .fp-submit:disabled{opacity:.35;cursor:not-allowed}
    .fp-err{margin-top:10px;padding:11px 14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:8px;color:#f87171;font-size:13px;line-height:1.6}

    /* ══ LOADING ══ */
    .ld{background:var(--g3);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .spinner{width:42px;height:42px;border:3px solid rgba(201,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ld-text{color:#fff;font-size:15px;font-weight:600}
    .ld-steps{display:flex;flex-direction:column;gap:7px;margin-top:8px}
    .ld-step{font-size:12px;display:flex;align-items:center;gap:7px;color:rgba(242,234,216,.22);transition:color .4s}
    .ld-step.active{color:var(--gold)}
    .ld-step.done{color:rgba(86,196,122,.7)}
    .ld-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

    /* ══ RESULTS ══ */
    .rp{background:var(--g3);min-height:100vh;display:flex;flex-direction:column}
    .rp-body{flex:1;padding:34px 24px 64px}
    .rp-inner{max-width:960px;margin:0 auto}
    .rp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .rp-title{font-size:21px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.5px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:4px 12px;background:rgba(201,168,67,.15);border:1px solid rgba(201,168,67,.3);color:var(--gold);border-radius:20px;font-size:12px;font-weight:600}
    .rp-btns{display:flex;gap:8px;flex-wrap:wrap}
    .rb-link{padding:8px 15px;background:rgba(255,255,255,.1);border:1px solid var(--dg-border);border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
    .rb-link:hover{background:rgba(255,255,255,.15)}
    .rb-pdf{padding:8px 15px;background:var(--gold);border:none;border-radius:8px;color:var(--g3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
    .rb-pdf:hover{background:var(--gold2)}
    .rb-back{padding:8px 15px;background:transparent;border:1px solid var(--dg-border);border-radius:8px;color:var(--dg-cream);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
    .rb-back:hover{border-color:var(--gold);color:var(--gold)}

    .link-box{background:rgba(201,168,67,.06);border:1px solid rgba(201,168,67,.2);border-radius:12px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .lb-label{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap}
    .lb-url{flex:1;font-size:12px;color:var(--dg-cream);background:rgba(255,255,255,.05);border:1px solid var(--dg-border);border-radius:7px;padding:6px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .lb-copy{padding:6px 13px;background:var(--gold);border:none;border-radius:7px;color:var(--g3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

    .strat{background:rgba(201,168,67,.08);border:1px solid rgba(201,168,67,.2);border-radius:14px;padding:20px 24px;margin-bottom:22px}
    .strat-lbl{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
    .strat-txt{font-size:14px;line-height:1.85;color:#fff}

    .psec{margin-bottom:22px}
    .phdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--dg-border)}
    .pbdg{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800}
    .pb-필수{background:#DC2626;color:#fff}
    .pb-추천{background:rgba(201,168,67,.9);color:var(--g3)}
    .pb-선택{background:rgba(255,255,255,.12);color:#fff}
    .pdsc{font-size:12px;color:var(--dg-cream)}
    .pcnt{margin-left:auto;font-size:12px;color:rgba(242,234,216,.3)}

    .sc-필수{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .sc-추천{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .sc-선택{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .scard{background:var(--g);border:1px solid var(--dg-border);border-radius:14px;padding:16px;transition:transform .2s}
    .scard:hover{transform:translateY(-2px)}
    .sc-필수 .scard{border-left:3px solid #DC2626}
    .sc-추천 .scard{border-left:3px solid var(--gold)}
    .sc-선택 .scard{border-left:3px solid rgba(255,255,255,.18)}
    .sc-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .sname{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
    .cat{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
    .cat-g{background:rgba(91,156,246,.15);color:#7bb3f8;border:1px solid rgba(91,156,246,.25)}
    .cat-c{background:rgba(201,168,67,.15);color:var(--gold);border:1px solid rgba(201,168,67,.25)}
    .cat-f{background:rgba(86,196,122,.15);color:#6dcf8a;border:1px solid rgba(86,196,122,.25)}
    .sreason{font-size:13px;line-height:1.7;color:var(--dg-cream);padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--dg-border)}
    .ext-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px}
    .ext-list{list-style:none;display:flex;flex-direction:column;gap:5px}
    .ext-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--dg-cream);line-height:1.5}
    .ext-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;margin-top:5px;flex-shrink:0}
    .rp-footer{margin-top:24px;text-align:center;font-size:11px;color:rgba(242,234,216,.22);line-height:1.7}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--g);border:1px solid rgba(201,168,67,.3);color:var(--gold);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;animation:toastIn .3s ease}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* RESPONSIVE */
    @media(max-width:900px){
      .l-intro{grid-template-columns:1fr;padding:60px 24px}
      .l-stat-row{grid-template-columns:repeat(2,1fr)}
      .l-step,.l-step.rev{grid-template-columns:1fr;gap:28px;direction:ltr}
      .l-how{padding:60px 24px}
      .sc-추천,.sc-선택{grid-template-columns:repeat(2,1fr)}
      .l-tut-bar-steps{display:none}
    }
    @media(max-width:640px){
      .fp-row{grid-template-columns:1fr 1fr}
      .fp-row>:first-child{grid-column:1/-1}
      .sc-필수,.sc-추천,.sc-선택{grid-template-columns:1fr}
      .fp-header,.l-tut-bar,.l-footer{padding:0 20px}
      .l-cta{padding:60px 24px}
      .rp-btns{flex-direction:column;width:100%}
      .rp-top{flex-direction:column}
    }
    @media print{
      .fp-header,.rp-btns,.link-box,.rp-footer,.toast{display:none!important}
      body{background:#fff}
      .rp,.rp-body{background:#fff}
      .scard{background:#fafafa;border:1px solid #ddd;break-inside:avoid}
      .sc-필수 .scard{border-left:3px solid #DC2626}
      .sc-추천 .scard{border-left:3px solid #c9a843}
      .sname,.strat-txt,.rp-title{color:#111!important}
      .sreason,.ext-item{color:#555!important}
      .strat{border:1px solid #c9a843;background:#fffbf0}
      .pbdg,.chip{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function FormPage({onBack, onResult}){
  const [form,setForm]=useState({grade:'1',career:'',major:'',university:''});
  const [error,setError]=useState(null);
  const [loading,setLoading]=useState(false);
  const [lstep,setLstep]=useState(0);
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const valid=form.career.trim()&&form.major.trim();

  const submit=async()=>{
    setLoading(true);setError(null);setLstep(0);
    const t=setInterval(()=>setLstep(s=>s<LSTEPS.length-1?s+1:s),2400);
    try{
      const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:SYSTEM,
          messages:[{role:'user',content:`고${form.grade}학년, 희망진로:${form.career}, 희망전공:${form.major}${form.university?`, 희망대학:${form.university}`:''}`}]})});
      const data=await res.json();
      if(!res.ok) throw new Error(data?.error?.message||data?.error||`오류 ${res.status}`);
      const raw=data.content[0].text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      clearInterval(t);
      onResult({results:JSON.parse(raw),form});
    }catch(e){clearInterval(t);setError(`오류: ${String(e.message)}`);setLoading(false);}
  };

  if(loading) return(
    <div className="ld">
      <div className="spinner"/>
      <p className="ld-text">{LSTEPS[lstep]}...</p>
      <div className="ld-steps">{LSTEPS.map((s,i)=>(
        <div key={i} className={`ld-step ${i<lstep?'done':i===lstep?'active':''}`}><span className="ld-dot"/><span>{s}</span></div>
      ))}</div>
    </div>
  );

  return(
    <div className="fp">
      <div className="fp-header">
        <div className="fp-logo" onClick={onBack}>큐리큘라 — <em>과목큐리큘라</em></div>

        <p className="fp-sub">학년·진로·전공을 입력하면 맞춤 선택과목과 세특 탐구 주제까지 한번에</p>
      </div>
      <div className="fp-body">
        <div className="fp-card">
          <div className="fp-row">
            <div className="fp-grp">
              <label className="fp-lbl">학년<span className="req">*</span></label>
              <select className="fp-ctrl" value={form.grade} onChange={set('grade')}>
                <option value="1">고1</option><option value="2">고2</option>
              </select>
            </div>
            <div className="fp-grp">
              <label className="fp-lbl">희망 진로<span className="req">*</span></label>
              <input className="fp-ctrl" placeholder="예: 의사, 소프트웨어 엔지니어…" value={form.career} onChange={set('career')}/>
            </div>
            <div className="fp-grp">
              <label className="fp-lbl">희망 전공<span className="req">*</span></label>
              <input className="fp-ctrl" placeholder="예: 의학과, 컴퓨터공학과…" value={form.major} onChange={set('major')}/>
            </div>
          </div>
          <div className="fp-full">
            <label className="fp-lbl">희망 대학 <span className="fp-sub-lbl">선택 — 해당 대학 권장 과목 반영</span></label>
            <input className="fp-ctrl" placeholder="예: 서울대, 연세대, 성균관대…" value={form.university} onChange={set('university')}/>
          </div>
          <button className="fp-submit" onClick={submit} disabled={!valid}>추천받기 →</button>
          {error&&<div className="fp-err">{error}</div>}
        </div>
      </div>
    </div>
  );
}

/* ── RESULTS ── */
function PSection({priority,subjects}){
  const list=subjects.filter(s=>s.priority===priority);
  if(!list.length) return null;
  return(
    <div className="psec">
      <div className="phdr">
        <span className={`pbdg pb-${priority}`}>{priority}</span>
        <span className="pdsc">{PMETA[priority].desc}</span>
        <span className="pcnt">{list.length}과목</span>
      </div>
      <div className={`sc-${priority}`}>
        {list.map((s,i)=>(
          <div key={i} className="scard">
            <div className="sc-top"><span className="sname">{s.name}</span><span className={catClass(s.category)}>{s.category}</span></div>
            <p className="sreason">{s.reason}</p>
            <div className="ext-lbl">세특 탐구 주제</div>
            <ul className="ext-list">{(s.extracurricular||[]).map((t,j)=>(
              <li key={j} className="ext-item"><span className="ext-dot"/>{t}</li>
            ))}</ul>
          </div>
        ))}
      </div>
    </div>
  );
}

function ResultsPage({results,form,onBack,onNew}){
  const [toast,setToast]=useState(false);
  const url=shareUrl({results,form});
  const copy=()=>{if(!url) return;navigator.clipboard.writeText(url).then(()=>{setToast(true);setTimeout(()=>setToast(false),2200);});};

  return(
    <div className="rp">
      <div className="fp-header">
        <div className="fp-logo" onClick={onNew}>큐리큘라 — <em>과목큐리큘라</em></div>
        <button className="fp-back" onClick={onNew}>← 처음으로</button>
      </div>
      <div className="rp-body">
        <div className="rp-inner">
          <div className="rp-top">
            <div>
              <h2 className="rp-title">맞춤 과목 추천 결과</h2>
              <div className="chips">
                <span className="chip">고{form.grade}</span>
                <span className="chip">{form.career}</span>
                <span className="chip">{form.major}</span>
                {form.university&&<span className="chip">{form.university}</span>}
              </div>
            </div>
            <div className="rp-btns">
              <button className="rb-link" onClick={copy}>🔗 링크 복사</button>
              <button className="rb-pdf" onClick={()=>window.print()}>📄 PDF 저장</button>
              <button className="rb-back" onClick={onBack}>↩ 다시 입력</button>
            </div>
          </div>
          {url&&<div className="link-box"><span className="lb-label">🔗 공유 링크</span><div className="lb-url">{url}</div><button className="lb-copy" onClick={copy}>복사</button></div>}
          <div className="strat"><div className="strat-lbl">과목 선택 전략</div><p className="strat-txt">{results.overall_strategy}</p></div>
          {['필수','추천','선택'].map(p=><PSection key={p} priority={p} subjects={results.subjects||[]}/>)}
          <div className="rp-footer">2022 개정 교육과정 기준 · 권장과목은 대학·학과별로 매년 변경됩니다 · 각 대학 입학처에서 최신 정보를 확인하세요 · 필탑학원</div>
        </div>
      </div>
      {toast&&<div className="toast">✓ 링크가 복사되었습니다</div>}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [page,setPage]=useState('landing');
  const [rdata,setRdata]=useState(null);

  useEffect(()=>{
    const h=location.hash;
    if(h.startsWith('#r=')){
      const d=dec(h.slice(3));
      if(d?.results&&d?.form){setRdata(d);setPage('results');}
    }
  },[]);

  const goForm=()=>{setPage('form');window.scrollTo(0,0);};
  const goHome=()=>{setPage('landing');window.scrollTo(0,0);history.pushState('','',location.pathname);};
  const goResult=d=>{
    setRdata(d);setPage('results');
    const u=shareUrl(d);if(u)history.pushState('','',u);
    window.scrollTo(0,0);
  };

  if(page==='landing') return <Landing onStart={goForm}/>;
  if(page==='form') return <FormPage onBack={goHome} onResult={goResult}/>;
  if(page==='results'&&rdata) return <ResultsPage results={rdata.results} form={rdata.form} onBack={()=>setPage('form')} onNew={goHome}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
