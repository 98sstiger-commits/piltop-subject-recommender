<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진로과목선택 - 고교학점제 맞춤 과목추천</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b1d12;
      --bg2:     #112518;
      --bg3:     #162e1e;
      --gold:    #c9a843;
      --gold2:   #d4b95a;
      --text:    #f0ede4;
      --muted:   #8aab95;
      --border:  rgba(255,255,255,0.09);
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #ffffff;
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e8e8e8;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-weight: 800; font-size: 15px;
    }
    .logo-name { font-size: 18px; font-weight: 700; color: #111; }
    .header-nav { display: flex; gap: 28px; }
    .header-nav a {
      font-size: 14px; color: #555; text-decoration: none;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: #111; }

    /* ── Hero ── */
    .hero {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,67,0.08), transparent);
      padding: 88px 24px 100px;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(201,168,67,0.12);
      border: 1px solid rgba(201,168,67,0.28);
      color: var(--gold);
      padding: 6px 18px; border-radius: 20px;
      font-size: 13px; font-weight: 500; margin-bottom: 28px;
    }
    .hero-badge-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
    .hero-title {
      font-size: clamp(42px, 6vw, 76px);
      font-weight: 800; color: var(--text);
      line-height: 1.1; margin-bottom: 16px;
    }
    .hero-sub { font-size: 16px; color: var(--muted); margin-bottom: 20px; }
    .hero-stats {
      display: flex; gap: 28px; justify-content: center;
      margin-bottom: 48px; flex-wrap: wrap;
    }
    .hero-stat { text-align: center; }
    .hero-stat-num { font-size: 28px; font-weight: 800; color: var(--gold); line-height: 1; }
    .hero-stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Form card ── */
    .form-card {
      max-width: 740px; margin: 0 auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px 28px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 140px 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .form-group { display: flex; flex-direction: column; }
    .form-label {
      font-size: 12px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.04em; margin-bottom: 7px;
    }
    .required { color: var(--gold); margin-left: 2px; }
    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 9px;
      color: var(--text);
      padding: 11px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
      width: 100%;
    }
    .form-control:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.08);
    }
    .form-control::placeholder { color: rgba(138,171,149,0.45); }
    select.form-control option { background: #162e1e; }
    .form-full { margin-bottom: 22px; }
    .submit-btn {
      width: 100%; padding: 15px;
      background: var(--gold);
      border: none; border-radius: 10px;
      color: #0b1d12; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--gold2); }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-box {
      margin-top: 14px; padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; color: #f87171; font-size: 14px;
    }

    /* ── Loading ── */
    .loading-wrap {
      min-height: calc(100vh - 64px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: var(--bg);
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(201,168,67,0.18);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { color: var(--muted); font-size: 16px; }
    .loading-msg::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%,20%  { content: ''; }
      40%     { content: '.'; }
      60%     { content: '..'; }
      80%,100%{ content: '...'; }
    }

    /* ── Results ── */
    .results-wrap {
      background: var(--bg);
      min-height: calc(100vh - 64px);
      padding: 52px 24px 80px;
    }
    .results-inner { max-width: 1100px; margin: 0 auto; }

    .results-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      margin-bottom: 32px; flex-wrap: wrap;
    }
    .results-title { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 5px 13px;
      background: rgba(201,168,67,0.13);
      border: 1px solid rgba(201,168,67,0.28);
      color: var(--gold); border-radius: 20px; font-size: 13px;
    }
    .back-btn {
      padding: 9px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted); font-size: 14px;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s; white-space: nowrap;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Strategy */
    .strategy {
      background: linear-gradient(135deg, rgba(201,168,67,0.1), rgba(201,168,67,0.03));
      border: 1px solid rgba(201,168,67,0.22);
      border-radius: 14px; padding: 26px 30px; margin-bottom: 32px;
    }
    .strategy-label {
      font-size: 11px; font-weight: 700; color: var(--gold);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
    }
    .strategy-text { font-size: 15px; line-height: 1.8; color: var(--text); }

    /* Subject grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* Subject card */
    .scard {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
      transition: border-color 0.25s, transform 0.25s;
    }
    .scard:hover { border-color: rgba(201,168,67,0.3); transform: translateY(-3px); }

    .cat {
      display: inline-block; padding: 3px 11px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      margin-bottom: 12px; letter-spacing: 0.03em;
    }
    .cat-g { background: rgba(91,156,246,0.14); color: #5b9cf6; border: 1px solid rgba(91,156,246,0.28); }
    .cat-c { background: rgba(201,168,67,0.14); color: #c9a843; border: 1px solid rgba(201,168,67,0.28); }
    .cat-f { background: rgba(86,196,122,0.14); color: #56c47a; border: 1px solid rgba(86,196,122,0.28); }

    .sname { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    .sreason {
      font-size: 13px; line-height: 1.7; color: var(--muted);
      padding-bottom: 14px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .ext-label {
      font-size: 10px; font-weight: 700; color: var(--gold);
      letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 8px;
    }
    .ext-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .ext-item {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 12px; color: var(--muted); line-height: 1.5;
    }
    .ext-dot {
      width: 4px; height: 4px; background: var(--gold);
      border-radius: 50%; margin-top: 6px; flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-row > :first-child { grid-column: 1 / -1; }
      .grid { grid-template-columns: 1fr; }
      .header { padding: 0 20px; }
      .hero { padding: 60px 16px 80px; }
      .form-card { padding: 24px 18px 20px; }
    }
    @media (max-width: 420px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const SYSTEM = `당신은 2022 개정 교육과정(2025 고교학점제) 전문 과목추천 AI입니다.
반드시 JSON만 응답하세요. 마크다운·코드블록·추가 설명 없이 순수 JSON만 출력하세요.

응답 형식:
{
  "overall_strategy": "이 학생의 과목 선택 전략 (3~4문장)",
  "subjects": [
    {
      "name": "과목명",
      "category": "일반선택",
      "reason": "이 과목을 선택해야 하는 이유 (2~3문장, 진로·전공·대학과 구체적으로 연계)",
      "extracurricular": ["비교과 탐구 주제 1", "비교과 탐구 주제 2", "비교과 탐구 주제 3"]
    }
  ]
}

규칙:
- category 값은 "일반선택" "진로선택" "융합선택" 중 하나
- 총 6~9개 과목 추천, 카테고리 고루 분포
- 반드시 아래 2022 개정 교육과정 실제 과목명만 사용할 것 (구 교육과정 과목명 절대 사용 금지)
- 희망 대학이 있으면 해당 대학 전공 관련 권장 과목 우선 반영
- 비교과 주제는 학생이 실제 학교에서 수행할 수 있는 구체적 탐구·활동으로 작성

=== 2022 개정 교육과정 선택과목 전체 목록 ===

[수학 — 일반선택] 대수, 미적분Ⅰ, 확률과 통계
[수학 — 진로선택] 기하, 미적분Ⅱ, 경제 수학, 인공지능 수학, 직업 수학
[수학 — 융합선택] 수학과 문화, 실용 통계, 수학과제 탐구

[과학 — 일반선택] 물리학, 화학, 생명과학, 지구과학
[과학 — 진로선택] 역학과 에너지, 전자기와 양자, 물질과 에너지, 화학 반응의 세계, 세포와 물질대사, 생물의 유전, 지구시스템과학, 행성우주과학
[과학 — 융합선택] 과학의 역사와 문화, 기후변화와 환경생태, 융합과학 탐구

[국어 — 일반선택] 화법과 언어, 독서와 작문, 문학
[국어 — 진로선택] 주제 탐구 독서, 문학과 영상, 직무 의사소통
[국어 — 융합선택] 독서 토론과 글쓰기, 매체 의사소통, 언어생활 탐구

[영어 — 일반선택] 영어Ⅰ, 영어Ⅱ, 영어 독해와 작문
[영어 — 진로선택] 영어 발표와 토론, 심화 영어, 영미 문학 읽기, 직무 영어
[영어 — 융합선택] 실생활 영어 회화, 미디어 영어, 세계 문화와 영어

[사회 — 일반선택] 한국지리 탐구, 세계지리 탐구, 세계사, 사회와 문화, 현대사회와 윤리
[사회 — 진로선택] 도시의 미래 탐구, 동아시아 역사 기행, 정치, 법과 사회, 경제, 윤리와 사상, 인문학과 윤리, 국제 관계의 이해
[사회 — 융합선택] 여행지리, 역사로 탐구하는 현대 세계, 사회문제 탐구, 금융과 경제생활, 윤리문제 탐구, 기후변화와 지속가능한 세계

[정보·기술 — 일반선택] 정보
[정보·기술 — 진로선택] 인공지능 기초, 데이터 과학, 소프트웨어와 생활
[정보·기술 — 융합선택] 정보 통신과 미래 사회

[예술 — 일반선택] 음악, 미술, 연극
[예술 — 진로선택] 음악 연주와 창작, 음악 감상과 비평, 미술 창작, 미술 감상과 비평
[예술 — 융합선택] 음악과 미디어, 미술과 매체

[체육 — 일반선택] 체육1, 체육2
[체육 — 진로선택] 운동과 건강, 스포츠 생활1, 스포츠 생활2
[체육 — 융합선택] 스포츠 문화, 스포츠 과학

[기술·가정 — 일반선택] 기술·가정, 로봇과 공학세계, 생활과학 탐구
[기술·가정 — 진로선택] 공학 일반, 창의 공학 설계, 지식 재산 일반, 발명과 기업가 정신, 인공지능과 미래 생활, 아동발달과 부모, 생애 설계와 자립
[기술·가정 — 융합선택] 가정과학, 지식 재산과 경영, 미래 기술과 사회

[제2외국어/한문 — 일반선택] 한문, 일본어Ⅰ, 중국어Ⅰ, 독일어Ⅰ, 프랑스어Ⅰ, 스페인어Ⅰ
[제2외국어/한문 — 진로선택] 한문 고전 읽기, 일본어Ⅱ, 중국어Ⅱ, 독일어Ⅱ, 프랑스어Ⅱ, 스페인어Ⅱ`;

    function catClass(c) {
      if (c === '일반선택') return 'cat cat-g';
      if (c === '진로선택') return 'cat cat-c';
      return 'cat cat-f';
    }

    function Header() {
      return (
        <header className="header">
          <div className="logo">
            <div className="logo-icon">진</div>
            <span className="logo-name">진로과목선택</span>
          </div>
          <nav className="header-nav">
            <a href="#">고교학점제란?</a>
            <a href="#">과목 안내</a>
          </nav>
        </header>
      );
    }

    function FormView({ form, setForm, onSubmit, error }) {
      const valid = form.career.trim() && form.major.trim();
      const set = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

      return (
        <main className="hero">
          <div className="hero-badge">
            <span className="hero-badge-dot" />
            고교학점제 맞춤 과목추천
          </div>
          <h1 className="hero-title">진로과목선택</h1>
          <p className="hero-sub">학년·진로·전공을 입력하면 AI가 최적의 선택과목을 분석합니다</p>
          <div className="hero-stats">
            <div className="hero-stat"><div className="hero-stat-num">2025</div><div className="hero-stat-label">고교학점제 기준</div></div>
            <div className="hero-stat"><div className="hero-stat-num">AI</div><div className="hero-stat-label">맞춤 분석</div></div>
            <div className="hero-stat"><div className="hero-stat-num">비교과</div><div className="hero-stat-label">활동 주제 연계</div></div>
          </div>

          <div className="form-card">
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">학년<span className="required">*</span></label>
                <select className="form-control" value={form.grade} onChange={set('grade')}>
                  <option value="1">1학년</option>
                  <option value="2">2학년</option>
                  <option value="3">3학년</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">진로 희망<span className="required">*</span></label>
                <input className="form-control" placeholder="예: 의사, 소프트웨어 엔지니어, 건축가…" value={form.career} onChange={set('career')} />
              </div>
              <div className="form-group">
                <label className="form-label">희망 전공<span className="required">*</span></label>
                <input className="form-control" placeholder="예: 의학과, 컴퓨터공학과, 건축학과…" value={form.major} onChange={set('major')} />
              </div>
            </div>

            <div className="form-full">
              <label className="form-label">희망 대학교 <span style={{color:'var(--muted)',fontWeight:400}}>(선택 — 입력 시 해당 대학 권장 과목 반영)</span></label>
              <input className="form-control" placeholder="예: 서울대학교, 연세대학교, 고려대학교…" value={form.university} onChange={set('university')} />
            </div>

            <button className="submit-btn" onClick={onSubmit} disabled={!valid}>
              추천받기
            </button>
            {error && <div className="error-box">{error}</div>}
          </div>
        </main>
      );
    }

    function LoadingView() {
      return (
        <div className="loading-wrap">
          <div className="spinner" />
          <p className="loading-msg">과목을 분석하는 중</p>
        </div>
      );
    }

    function ResultsView({ results, form, onBack }) {
      return (
        <div className="results-wrap">
          <div className="results-inner">
            <div className="results-top">
              <div>
                <h2 className="results-title">맞춤 과목 추천 결과</h2>
                <div className="chips">
                  <span className="chip">{form.grade}학년</span>
                  <span className="chip">{form.career}</span>
                  <span className="chip">{form.major}</span>
                  {form.university && <span className="chip">{form.university}</span>}
                </div>
              </div>
              <button className="back-btn" onClick={onBack}>← 다시 입력</button>
            </div>

            <div className="strategy">
              <div className="strategy-label">과목 선택 전략</div>
              <p className="strategy-text">{results.overall_strategy}</p>
            </div>

            <div className="grid">
              {results.subjects.map((s, i) => (
                <div key={i} className="scard">
                  <span className={catClass(s.category)}>{s.category}</span>
                  <div className="sname">{s.name}</div>
                  <p className="sreason">{s.reason}</p>
                  <div className="ext-label">비교과 활동 주제</div>
                  <ul className="ext-list">
                    {s.extracurricular.map((t, j) => (
                      <li key={j} className="ext-item">
                        <span className="ext-dot" />{t}
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView]     = useState('form');
      const [form, setForm]     = useState({ grade: '1', career: '', major: '', university: '' });
      const [results, setResults] = useState(null);
      const [error, setError]   = useState(null);

      const submit = async () => {
        setView('loading');
        setError(null);

        const msg = `학년: ${form.grade}학년\n진로 희망: ${form.career}\n희망 전공: ${form.major}${form.university ? `\n희망 대학교: ${form.university}` : ''}`;

        try {
          const res  = await fetch('/api/proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: [{ role: 'user', content: msg }], system: SYSTEM }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `서버 오류 (${res.status})`);

          const raw  = data.content[0].text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
          const parsed = JSON.parse(raw);
          setResults(parsed);
          setView('results');
        } catch (e) {
          setError(`오류가 발생했습니다: ${e.message}`);
          setView('form');
        }
      };

      return (
        <>
          <Header />
          {view === 'form'    && <FormView form={form} setForm={setForm} onSubmit={submit} error={error} />}
          {view === 'loading' && <LoadingView />}
          {view === 'results' && results && <ResultsView results={results} form={form} onBack={() => { setView('form'); setError(null); }} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
